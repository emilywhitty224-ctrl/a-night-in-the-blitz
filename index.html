<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Night in the Blitz — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; }
    #version-overlay {
      position: fixed; bottom: 18px; right: 90px;
      color: #88aacc; font-family: monospace; font-size: 13px;
      opacity: 0.75; pointer-events: none; z-index: 9999; user-select: none;
    }
  </style>

  <script>
    // Configure Draco decoder before any models load
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
        AFRAME.systems['gltf-model'] && AFRAME.systems['gltf-model'].loader &&
          AFRAME.systems['gltf-model'].loader.setDRACOLoader(dracoLoader);
        // Also hook into scene load in case the system isn't ready yet
        document.querySelector('a-scene').addEventListener('loaded', function () {
          try {
            var sys = document.querySelector('a-scene').systems['gltf-model'];
            if (sys && sys.loader) sys.loader.setDRACOLoader(dracoLoader);
          } catch(e) {}
        });
      } catch(e) { console.warn('[draco-setup]', e); }
    });

    // Suppress errors that would kill the Quest WebXR session
    window.addEventListener('unhandledrejection', function (e) {
      e.preventDefault();
      console.warn('[safety] rejection suppressed:', e.reason);
    });
    window.onerror = function (msg, src, line) {
      console.warn('[error]', msg, src + ':' + line);
      return false;
    };

    // ── Merge vertices by (position + UV) and rebuild index. Used by
    //    night-darken to fix the faceted look from Blender's per-face split
    //    normals. UV is included in the key so texture seams survive. ─────
    function _mergeVertsByPosUV(geom) {
      if (!geom || !geom.attributes || !geom.attributes.position) return geom;
      // Bail on multi-material meshes (groups) — re-slicing groups after a
      // remap is fiddly and not worth the risk for the shading gain.
      if (geom.groups && geom.groups.length > 1) return geom;
      var posAttr = geom.attributes.position;
      var uvAttr = geom.attributes.uv;
      var oldIndex = geom.index;
      var triIndices = oldIndex ? oldIndex.array : null;
      var triCount = oldIndex ? oldIndex.count : posAttr.count;
      var n = posAttr.count;
      var tol = 1e4; // quantize to 0.0001 m + 0.0001 uv
      var hash = Object.create(null);
      var remap = new Int32Array(n);
      var kept = 0;
      for (var i = 0; i < n; i++) {
        var x = Math.round(posAttr.getX(i) * tol);
        var y = Math.round(posAttr.getY(i) * tol);
        var z = Math.round(posAttr.getZ(i) * tol);
        var key = x + '_' + y + '_' + z;
        if (uvAttr) {
          var u = Math.round(uvAttr.getX(i) * tol);
          var v = Math.round(uvAttr.getY(i) * tol);
          key += '_' + u + '_' + v;
        }
        var slot = hash[key];
        if (slot === undefined) {
          hash[key] = kept;
          remap[i] = kept;
          kept++;
        } else {
          remap[i] = slot;
        }
      }
      if (kept === n) return geom; // nothing to merge
      var newGeom = new THREE.BufferGeometry();
      var attribs = geom.attributes;
      var seen = new Uint8Array(kept);
      for (var name in attribs) {
        var attr = attribs[name];
        var itemSize = attr.itemSize;
        var Ctor = attr.array.constructor;
        var newArr = new Ctor(kept * itemSize);
        for (var j = 0; j < n; j++) {
          var dst = remap[j];
          if (seen[dst]) continue; // first-writer wins (dupes have identical pos+uv)
          seen[dst] = 1;
          for (var k = 0; k < itemSize; k++) {
            newArr[dst * itemSize + k] = attr.array[j * itemSize + k];
          }
        }
        newGeom.setAttribute(name, new THREE.BufferAttribute(newArr, itemSize, attr.normalized));
        seen.fill(0);
      }
      var IndexCtor = kept > 65535 ? Uint32Array : Uint16Array;
      var newIdx = new IndexCtor(triCount);
      if (triIndices) {
        for (var t = 0; t < triCount; t++) newIdx[t] = remap[triIndices[t]];
      } else {
        for (var t = 0; t < triCount; t++) newIdx[t] = remap[t];
      }
      newGeom.setIndex(new THREE.BufferAttribute(newIdx, 1));
      return newGeom;
    }

    // ── Night darken — darkens baked GLB textures to blackout levels ─────
    AFRAME.registerComponent('night-darken', {
      init: function () {
        this.el.addEventListener('model-loaded', function (e) {
          try {
            var model = e.detail.model;
            model.updateMatrixWorld(true);
            var topCorner = new THREE.Vector3();
            model.traverse(function (node) {
              if (!node.isMesh) return;
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(function (mat, i) {
                if (mat.emissive) mat.emissive.setRGB(0, 0, 0);
                mat.emissiveIntensity = 0;
                if (mat.lightMap) mat.lightMap = null;
                mat.lightMapIntensity = 0;
                if (mat.envMap) mat.envMap = null;

                if (mat.type === 'MeshBasicMaterial') {
                  if (node.geometry && !node.geometry.attributes.normal) node.geometry.computeVertexNormals();
                  var replacement = new THREE.MeshStandardMaterial({
                    map: mat.map,
                    color: new THREE.Color(0.28, 0.3, 0.38),
                    roughness: 0.9, metalness: 0.0,
                    side: THREE.DoubleSide, transparent: mat.transparent,
                    opacity: mat.opacity, alphaTest: mat.alphaTest
                  });
                  replacement.needsUpdate = true;
                  if (Array.isArray(node.material)) { node.material[i] = replacement; }
                  else { node.material = replacement; }
                } else {
                  mat.color.setRGB(0.28, 0.3, 0.38);
                  mat.side = THREE.DoubleSide;
                  mat.needsUpdate = true;
                }
              });

              // Smooth shading — merge duplicate vertices (same position +
              // same UV so we don't break texture seams), rebuild the index,
              // then computeVertexNormals averages across shared verts. This
              // is what fixes the faceted-polygon look when Blender exports
              // with split normals per face.
              if (node.geometry && node.geometry.attributes && node.geometry.attributes.position) {
                try {
                  var merged = _mergeVertsByPosUV(node.geometry);
                  if (merged && merged !== node.geometry) {
                    node.geometry.dispose && node.geometry.dispose();
                    node.geometry = merged;
                  }
                  node.geometry.computeVertexNormals();
                } catch(e) { console.warn('[merge]', e); }
                var mats2 = Array.isArray(node.material) ? node.material : [node.material];
                mats2.forEach(function (m) {
                  if (m) { m.flatShading = false; m.needsUpdate = true; }
                });
              }

              // Wet-cobble look — meshes whose world-Y top is below ~0.5m
              // get lowered roughness + a touch of metalness so puddled ground
              // picks up torch + streetlamp reflections.
              if (node.geometry) {
                if (!node.geometry.boundingBox) node.geometry.computeBoundingBox();
                var bb = node.geometry.boundingBox;
                if (bb) {
                  topCorner.set(0, bb.max.y, 0).applyMatrix4(node.matrixWorld);
                  if (topCorner.y < 0.5) {
                    var cur = Array.isArray(node.material) ? node.material : [node.material];
                    cur.forEach(function (m) {
                      if (m && 'roughness' in m) {
                        m.roughness = 0.55;
                        m.metalness = 0.1;
                        m.needsUpdate = true;
                      }
                    });
                  }
                }
              }
            });
          model.traverse(function(obj) { obj.matrixAutoUpdate = false; obj.updateMatrix(); });
          } catch(err) { console.warn('night-darken error:', err); }
        });
      }
    });

    // ── Scene materials fix — cleans up three things the Blender→GLB export
    //    leaves behind that break the look under blackout lighting:
    //      1. Vertex colors on brick meshes — many verts export as near-black
    //         and multiply into the texture, producing the "spider web"
    //         speckle on walls. Strip the color attribute and disable
    //         vertexColors on the material.
    //      2. Emissive floors / lightboxes — Blender materials exported with
    //         emissive colors/maps render as glowing rectangles against the
    //         black sky. Zero emissive + clear emissiveMap.
    //      3. Single-sided meshes with flipped normals — most commonly the
    //         ground plane. Force DoubleSide so the floor renders regardless
    //         of which way Blender pointed the normal.
    AFRAME.registerComponent('scene-materials-fix', {
      init: function () {
        this.el.addEventListener('model-loaded', function (e) {
          try {
            var model = e.detail.model;
            var meshCount = 0;
            model.traverse(function (node) {
              if (!node.isMesh) return;
              meshCount++;
              // Strip baked vertex colors — they're the real cause of the
              // speckly "spider web" brick walls.
              if (node.geometry && node.geometry.attributes && node.geometry.attributes.color) {
                node.geometry.deleteAttribute('color');
              }
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(function (m) {
                if (!m) return;
                m.vertexColors = false;
                // Force opaque (alphaMode MASK/BLEND exports also cause lacy walls)
                m.transparent = false;
                m.opacity = 1;
                m.alphaTest = 0;
                m.alphaMap = null;
                m.depthWrite = true;
                // Kill emissive — no self-glowing floors/signs in blackout
                if (m.emissive) m.emissive.setRGB(0, 0, 0);
                m.emissiveIntensity = 0;
                m.emissiveMap = null;
                // DoubleSide so thin/flipped faces (floor) stay visible
                m.side = THREE.DoubleSide;
                m.needsUpdate = true;
              });
            });
            console.log('[scene-materials-fix] cleaned ' + meshCount + ' meshes');
          } catch (err) { console.warn('scene-materials-fix error:', err); }
        });
      }
    });

    // ── Barrage balloon builder — generates a historically convincing WWII
    //    balloon as child primitives: inflated cigar body, top ballonet bulge,
    //    rounded nose cap, three tapered tail fins (top + lower-port/starboard),
    //    rigging pendant band around the belly, taut mooring cable. Colors
    //    and sizes are data-driven so all five can share the same builder.
    //    Segment counts kept lean for Quest: body 24×14, smaller parts 14×10.
    AFRAME.registerComponent('barrage-balloon', {
      schema: {
        length:      {default: 6},      // long-axis scale (radius 1 sphere)
        diameter:    {default: 2},      // cross-section scale
        cableHeight: {default: 15},     // mooring cable length (0 = none)
        color:       {default: '#7a8e9a'},
        finColor:    {default: '#5a6e7a'},
        rigColor:    {default: '#3a3a3a'}
      },
      init: function () {
        var d = this.data;
        var r = d.diameter;
        var L = d.length;
        var bodyMat = 'shader:standard; color:' + d.color +
                      '; metalness:0.4; roughness:0.38;' +
                      ' emissive:#0a1018; emissiveIntensity:0.08';
        var finMat  = 'shader:standard; color:' + d.finColor +
                      '; metalness:0.2; roughness:0.6; side:double';
        var rigMat  = 'color:' + d.rigColor + '; roughness:0.9; metalness:0.15';

        // Inflated cigar body
        var body = document.createElement('a-sphere');
        body.setAttribute('radius', 1);
        body.setAttribute('scale', L + ' ' + r + ' ' + r);
        body.setAttribute('segments-width', 24);
        body.setAttribute('segments-height', 14);
        body.setAttribute('material', bodyMat);
        this.el.appendChild(body);

        // Three tail fins — Y-layout (top, lower-port, lower-starboard).
        // finAttachNorm is the normalised X position on the unit sphere, so
        // hullR gives the exact hull radius there, keeping fins flush.
        var self = this;
        var finAttachNorm = 0.75;
        var hullR    = r * Math.sqrt(1 - finAttachNorm * finAttachNorm);
        var finLen   = L * 0.28;
        var finTall  = r * 0.9;
        var finThick = 0.08;
        var finBaseR = hullR + finTall * 0.5;
        var finX     = -L * finAttachNorm;
        [0, 120, -120].forEach(function (deg) {
          var hub = document.createElement('a-entity');
          hub.setAttribute('position', finX + ' 0 0');
          hub.setAttribute('rotation', deg + ' 0 0');
          var fin = document.createElement('a-box');
          fin.setAttribute('width', finLen);
          fin.setAttribute('height', finTall);
          fin.setAttribute('depth', finThick);
          fin.setAttribute('position', '0 ' + finBaseR + ' 0');
          fin.setAttribute('material', finMat);
          hub.appendChild(fin);
          self.el.appendChild(hub);
        });

        // Rigging pendant band — dark hoop around the belly where cables attach
        var band = document.createElement('a-torus');
        band.setAttribute('radius', r * 1.02);
        band.setAttribute('radius-tubular', 0.04);
        band.setAttribute('segments-tubular', 24);
        band.setAttribute('segments-radial', 8);
        band.setAttribute('rotation', '90 0 0');
        band.setAttribute('position', (-L * 0.12) + ' 0 0');
        band.setAttribute('material', rigMat);
        this.el.appendChild(band);

        // Mooring cable — thicker, taut, attached at belly pendant band
        if (d.cableHeight > 0) {
          var cable = document.createElement('a-cylinder');
          cable.setAttribute('radius', 0.03);
          cable.setAttribute('height', d.cableHeight);
          cable.setAttribute('segments-radial', 6);
          cable.setAttribute('position', (-L * 0.12) + ' ' + (-r - d.cableHeight / 2) + ' 0');
          cable.setAttribute('material', rigMat);
          this.el.appendChild(cable);
        }
      }
    });

    // ── Torch flicker — random light intensity variation ──────────────────
    AFRAME.registerComponent('torch-flicker', {
      schema: { base: {default: 0.9}, range: {default: 0.35}, speed: {default: 8} },
      init: function () { this._t = 0; this._target = 1; this._cur = 1; },
      tick: function (t, dt) {
        this._t += dt * 0.001 * this.data.speed;
        if (this._t >= 1) {
          this._t = 0;
          this._target = this.data.base + (Math.random() - 0.5) * this.data.range * 2;
        }
        this._cur += (this._target - this._cur) * Math.min(1, dt * 0.012);
        this.el.setAttribute('light', 'intensity', Math.max(0, this._cur));
      }
    });

    // ── Smooth turn — right thumbstick, continuous rotation ───────────────
    AFRAME.registerComponent('smooth-turn', {
      schema: { speed: {default: 60} },
      init: function () {
        this._stickX = 0;
        this._before = new THREE.Vector3();
        this._after  = new THREE.Vector3();
        var self = this;
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('thumbstickmoved', function (e) {
            self._stickX = e.detail.x;
          });
          rightCtrl.addEventListener('thumbstickup', function () {
            self._stickX = 0;
          });
        }
        bind();
      },
      tick: function (t, dt) {
        if (Math.abs(this._stickX) < 0.15) return;
        var angle = THREE.MathUtils.degToRad(this._stickX * this.data.speed * dt / 1000);
        var rig = this.el.object3D;
        var cam = this._cam || (this._cam = document.getElementById('cam').object3D);
        cam.getWorldPosition(this._before);
        rig.rotation.y -= angle;
        rig.updateMatrixWorld();
        cam.getWorldPosition(this._after);
        rig.position.x += this._before.x - this._after.x;
        rig.position.z += this._before.z - this._after.z;
      }
    });


    // ── Torch pickup — pressing grip on the right controller within
    //    `threshold` metres of the torch reparents its object3D onto the right
    //    controller and snaps it to the held local pose. object3D.add (not DOM
    //    reparent) keeps ids/components intact so torch-toggle/flicker still
    //    find #torch-point and #torch-glow by id. ─────────────────────────────
    AFRAME.registerComponent('torch-pickup', {
      schema: {
        threshold:   { default: 0.25 },
        handSelector:{ default: '[oculus-touch-controls*="right"]' }
      },
      init: function () {
        this._picked = false;
        var self = this;
        (function bind() {
          var rightCtrl = document.querySelector(self.data.handSelector);
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          self._rightCtrl = rightCtrl;
          rightCtrl.addEventListener('gripdown', function () { self._tryPickup(); });
        })();
      },
      _tryPickup: function () {
        if (this._picked) return;
        var hand = this._rightCtrl;
        if (!hand || !hand.object3D) return;
        var handPos  = new THREE.Vector3();
        var torchPos = new THREE.Vector3();
        hand.object3D.getWorldPosition(handPos);
        this.el.object3D.getWorldPosition(torchPos);
        if (handPos.distanceTo(torchPos) > this.data.threshold) return;
        // Reparent torch onto the right controller at the saved held pose.
        hand.object3D.add(this.el.object3D);
        this.el.object3D.position.set(0, -0.07, 0.05);
        this.el.object3D.rotation.set(THREE.MathUtils.degToRad(-140), 0, 0);
        this._picked = true;
        try {
          var gp = hand.components['oculus-touch-controls'];
          if (gp && gp.controller && gp.controller.hapticActuators && gp.controller.hapticActuators[0]) {
            gp.controller.hapticActuators[0].pulse(0.8, 120);
          }
        } catch(e) {}
      }
    });

    // ── Coord readout — press LEFT TRIGGER to capture #torch's current world
    //    pose onto a camera-locked HUD and to the console. Screenshot-friendly
    //    so the user can send the numbers back for baking into the HTML. ─────
    AFRAME.registerComponent('coord-readout', {
      init: function () {
        var self = this;
        var cam = document.getElementById('cam');
        if (!cam) return;

        // HUD: dark panel + text, placed 0.7 m in front of the camera, slightly below gaze.
        var panel = document.createElement('a-plane');
        panel.setAttribute('width', 1.2);
        panel.setAttribute('height', 0.3);
        panel.setAttribute('color', '#000');
        panel.setAttribute('opacity', 0.75);
        panel.setAttribute('material', 'shader: flat; transparent: true');
        panel.setAttribute('position', '0 -0.28 -0.7');
        cam.appendChild(panel);

        var label = document.createElement('a-entity');
        label.setAttribute('position', '0 -0.28 -0.699');
        label.setAttribute('text', {
          value: 'Pick up torch, walk to spot,\npress LEFT TRIGGER to capture coords',
          align: 'center', color: '#ffffff', width: 1.6, wrapCount: 42, shader: 'msdf'
        });
        cam.appendChild(label);
        this._label = label;

        (function bind() {
          var leftCtrl = document.querySelector('[oculus-touch-controls*="left"]');
          if (!leftCtrl) { setTimeout(bind, 500); return; }
          self._leftCtrl = leftCtrl;
          leftCtrl.addEventListener('triggerdown', function () { self._capture(); });
        })();
      },

      _capture: function () {
        var torch = document.getElementById('torch');
        if (!torch || !torch.object3D) return;
        var pos = new THREE.Vector3();
        var q   = new THREE.Quaternion();
        torch.object3D.getWorldPosition(pos);
        torch.object3D.getWorldQuaternion(q);
        var eul = new THREE.Euler().setFromQuaternion(q, 'YXZ');
        var rx = THREE.MathUtils.radToDeg(eul.x);
        var ry = THREE.MathUtils.radToDeg(eul.y);
        var rz = THREE.MathUtils.radToDeg(eul.z);
        var f3 = function (n) { return n.toFixed(3); };
        var f1 = function (n) { return n.toFixed(1); };
        var text =
          'position="' + f3(pos.x) + ' ' + f3(pos.y) + ' ' + f3(pos.z) + '"\n' +
          'rotation="' + f1(rx)    + ' ' + f1(ry)    + ' ' + f1(rz)    + '"';
        this._label.setAttribute('text', {
          value: text, align: 'center', color: '#aaffaa',
          width: 1.6, wrapCount: 42, shader: 'msdf'
        });
        console.log('[coord-readout] #torch ' + text.replace('\n', '  '));
        try {
          var gp = this._leftCtrl.components['oculus-touch-controls'];
          if (gp && gp.controller && gp.controller.hapticActuators && gp.controller.hapticActuators[0]) {
            gp.controller.hapticActuators[0].pulse(0.6, 80);
          }
        } catch (e) {}
      }
    });

    // ── Torch toggle — right A button (beam only, model stays visible) ──────
    AFRAME.registerComponent('torch-toggle', {
      init: function () {
        var _on = true;
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('abuttondown', function () {
            try {
              _on = !_on;
              // Toggle beam and bulb glow only — torch model stays in hand
              var beam = document.getElementById('torch-point');
              var glow = document.getElementById('torch-glow');
              if (beam) beam.setAttribute('visible', _on);
              if (glow) glow.setAttribute('visible', _on);
              // Haptic buzz — short click feel
              var gp = rightCtrl.components['oculus-touch-controls'];
              if (gp && gp.controller && gp.controller.hapticActuators && gp.controller.hapticActuators[0]) {
                gp.controller.hapticActuators[0].pulse(_on ? 0.4 : 0.2, 60);
              }
            } catch(e) {}
          });
        }
        bind();
      }
    });

    // ── Matte darken — MeshStandardMaterial roughness:1 metalness:0 (no shine,
    //    but still responds to the torch's own spotlight so it's visible) ──────
    AFRAME.registerComponent('matte-darken', {
      init: function () {
        this.el.addEventListener('model-loaded', function (e) {
          try {
            e.detail.model.traverse(function (node) {
              if (!node.isMesh) return;
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(function (mat, i) {
                var m = new THREE.MeshStandardMaterial({
                  map: mat.map || null,
                  color: new THREE.Color(0.04, 0.04, 0.04),
                  roughness: 0.9,
                  metalness: 0.1,
                  side: THREE.DoubleSide,
                  transparent: mat.transparent || false,
                  opacity: mat.opacity !== undefined ? mat.opacity : 1.0,
                  alphaTest: mat.alphaTest || 0
                });
                if (Array.isArray(node.material)) node.material[i] = m;
                else node.material = m;
              });
            });
          } catch(err) { console.warn('[matte-darken]', err); }
        });
      }
    });

    // ── No fog — tick-based: waits until meshes exist, then disables fog ────
    AFRAME.registerComponent('no-fog', {
      init: function () { this._done = false; },
      tick: function () {
        if (this._done) return;
        var found = false;
        this.el.object3D.traverse(function (n) { if (n.isMesh) found = true; });
        if (!found) return;
        this._done = true;
        this.el.object3D.traverse(function (node) {
          if (!node.isMesh) return;
          var mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.forEach(function (m) { if (m) { m.fog = false; m.needsUpdate = true; } });
        });
      }
    });

    // ── Audio context unlock (Quest requires a user gesture) ──────────────
    function _unlockAudio() {
      try {
        var ctx = AFRAME.THREE.AudioContext.getContext();
        if (ctx && ctx.state === 'suspended') ctx.resume();
      } catch(e) {}
    }
    ['click','touchstart','touchend'].forEach(function (ev) {
      document.addEventListener(ev, _unlockAudio);
    });
    // In VR, click/touch don't fire — unlock on any controller button
    AFRAME.registerComponent('audio-unlock-vr', {
      init: function () {
        var evs = ['abuttondown','bbuttondown','xbuttondown','ybuttondown','triggerdown','gripdown','thumbstickdown'];
        var self = this;
        evs.forEach(function (e) { self.el.addEventListener(e, _unlockAudio); });
      }
    });

    // ── Distant explosions — scene-level component.
    //    Every 20–40s: brief directional-light flash + emissive horizon sphere
    //    from a random compass heading, followed 2–3s later by a filtered
    //    noise-burst rumble panned toward that same direction.
    AFRAME.registerComponent('distant-explosions', {
      init: function () {
        this._elapsed = 0;
        this._next = 5 + Math.random() * 10; // first one 5–15s in
      },
      tick: function (t, dt) {
        this._elapsed += dt * 0.001;
        if (this._elapsed >= this._next) {
          this._elapsed = 0;
          this._next = 20 + Math.random() * 20;
          this._fire();
        }
      },
      _fire: function () {
        var angle = Math.random() * Math.PI * 2;
        var dx = Math.cos(angle);
        var dz = Math.sin(angle);

        // Horizon glow — large flat-shaded emissive sphere far away
        var glow = document.createElement('a-entity');
        var gx = dx * 250, gz = dz * 250;
        glow.setAttribute('geometry', 'primitive:sphere; radius:25; segmentsWidth:12; segmentsHeight:8');
        glow.setAttribute('material', 'shader:flat; color:#ff9550; opacity:0; transparent:true; fog:false');
        glow.setAttribute('position', gx + ' 8 ' + gz);
        this.el.appendChild(glow);

        // Directional light pulse from the same azimuth
        var light = document.createElement('a-light');
        light.setAttribute('type', 'directional');
        light.setAttribute('color', '#ffd4a0');
        light.setAttribute('intensity', 0);
        light.setAttribute('position', (dx * 30) + ' 12 ' + (dz * 30));
        this.el.appendChild(light);

        // Two-stage flash: bright peak, dim tail, cleanup
        requestAnimationFrame(function () {
          glow.setAttribute('material', 'opacity', 0.7);
          light.setAttribute('light', 'intensity', 2.5);
        });
        setTimeout(function () {
          glow.setAttribute('material', 'opacity', 0.35);
          light.setAttribute('light', 'intensity', 1.0);
        }, 140);
        setTimeout(function () {
          glow.setAttribute('material', 'opacity', 0);
          light.setAttribute('light', 'intensity', 0);
        }, 450);
        setTimeout(function () {
          if (glow.parentNode) glow.parentNode.removeChild(glow);
          if (light.parentNode) light.parentNode.removeChild(light);
        }, 700);

        // Delayed rumble — sound travels ~340 m/s, 250 m → ~0.7s, but we
        // exaggerate to 2–3s for dramatic effect (explosions feel further away).
        var self = this;
        var delay = 2000 + Math.random() * 1000;
        setTimeout(function () { self._rumble(dx); }, delay);
      },
      _rumble: function (pan) {
        try {
          var ctx = AFRAME.THREE.AudioContext.getContext();
          if (!ctx || ctx.state === 'suspended') return;
          var duration = 1.5 + Math.random() * 0.8;
          var bufferSize = Math.floor(ctx.sampleRate * duration);
          var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          var data = buffer.getChannelData(0);
          for (var i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
          var src = ctx.createBufferSource();
          src.buffer = buffer;
          var filter = ctx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.value = 90;
          filter.Q.value = 1.5;
          var gain = ctx.createGain();
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.25);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
          src.connect(filter);
          filter.connect(gain);
          var panner = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
          if (panner) {
            panner.pan.value = Math.max(-1, Math.min(1, pan));
            gain.connect(panner);
            panner.connect(ctx.destination);
          } else {
            gain.connect(ctx.destination);
          }
          src.start(ctx.currentTime);
          src.stop(ctx.currentTime + duration);
        } catch(e) { console.warn('[rumble]', e); }
      }
    });

    // ── Rain — GPU-instanced vertical streaks falling through a cylinder
    //    around the rig. Parented to #rig so the cylinder follows the player.
    //    Only the translation columns of each instance matrix are rewritten
    //    each tick, keeping the loop cheap (~1500 * 3 float writes). ────────
    AFRAME.registerComponent('rain', {
      schema: {
        count:  { default: 750 },
        radius: { default: 12 },
        height: { default: 15 },
        speed:  { default: 8 },
        wind:   { default: 1.2 }
      },
      init: function () {
        var d = this.data;
        var geom = new THREE.PlaneGeometry(0.008, 0.22);
        geom.translate(0, -0.11, 0); // pivot at top so streaks fall from above
        var mat = new THREE.MeshBasicMaterial({
          color: 0xaabbdd,
          transparent: true,
          opacity: 0.35,
          depthWrite: false,
          side: THREE.DoubleSide,
          fog: true
        });
        var mesh = new THREE.InstancedMesh(geom, mat, d.count);
        mesh.frustumCulled = false;
        // Per-frame translation writes require DynamicDrawUsage; without it
        // three.js may still work but can warn or behave inconsistently on
        // some WebGL drivers (including Quest Browser).
        if (THREE.DynamicDrawUsage != null) {
          mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        }
        var dummy = new THREE.Object3D();
        this._positions = new Float32Array(d.count * 3);
        for (var i = 0; i < d.count; i++) {
          var a = Math.random() * Math.PI * 2;
          var r = Math.sqrt(Math.random()) * d.radius;
          var x = Math.cos(a) * r;
          var z = Math.sin(a) * r;
          var y = Math.random() * d.height;
          this._positions[i*3]   = x;
          this._positions[i*3+1] = y;
          this._positions[i*3+2] = z;
          dummy.position.set(x, y, z);
          dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);
        }
        mesh.instanceMatrix.needsUpdate = true;
        this.el.setObject3D('mesh', mesh);
        this._mesh = mesh;
      },
      tick: function (t, dt) {
        if (!this._mesh) return;
        var d = this.data;
        var dtS = Math.min(0.05, dt / 1000);
        var drop  = d.speed * dtS;
        var drift = d.wind * dtS;
        var arr = this._mesh.instanceMatrix.array;
        var pos = this._positions;
        var n = d.count;
        var rad = d.radius;
        var rad2 = rad * 2;
        for (var i = 0; i < n; i++) {
          var i3 = i * 3;
          pos[i3+1] -= drop;
          pos[i3]   += drift;
          if (pos[i3+1] < 0) {
            pos[i3+1] = d.height;
            var a = Math.random() * Math.PI * 2;
            var r = Math.sqrt(Math.random()) * rad;
            pos[i3]   = Math.cos(a) * r;
            pos[i3+2] = Math.sin(a) * r;
          }
          // wrap drift so streaks stay within the cylinder
          if (pos[i3] > rad)  pos[i3] -= rad2;
          if (pos[i3] < -rad) pos[i3] += rad2;
          var off = i * 16;
          arr[off + 12] = pos[i3];
          arr[off + 13] = pos[i3+1];
          arr[off + 14] = pos[i3+2];
        }
        this._mesh.instanceMatrix.needsUpdate = true;
      },
      remove: function () {
        if (this._mesh) {
          this._mesh.geometry.dispose();
          this._mesh.material.dispose();
        }
      }
    });

    // ── AA battery — rooftop anti-aircraft gun position. Fires bursts of
    //    3–7 shots on random intervals, each shot a brief muzzle flash
    //    (pooled emissive sphere, opacity animated) + a synthesised pop
    //    (bandpassed noise burst, panned by world direction from the cam).
    //    Real WWII AA guns (Bofors 40mm, 3.7" QF) fired in short bursts;
    //    staggering shots 140–220ms apart approximates their cadence. ─────
    AFRAME.registerComponent('aa-battery', {
      schema: {
        burstMin:     { default: 3 },
        burstMax:     { default: 7 },
        shotInterval: { default: 170 }, // ms between shots, + jitter
        nextFireMin:  { default: 8 },
        nextFireMax:  { default: 22 },
        flashColor:   { default: '#ffd47a' },
        flashRadius:  { default: 0.45 },
        popVolume:    { default: 0.28 }
      },
      init: function () {
        this._elapsed = 0;
        this._next = 2 + Math.random() * 6;
        // Persistent flash entity — reused every shot to avoid DOM churn.
        var flash = document.createElement('a-entity');
        flash.setAttribute('geometry',
          'primitive:sphere; radius:' + this.data.flashRadius + '; segmentsWidth:10; segmentsHeight:8');
        flash.setAttribute('material',
          'shader:flat; color:' + this.data.flashColor + '; opacity:0; transparent:true; fog:false; depthWrite:false');
        flash.setAttribute('no-fog', '');
        this.el.appendChild(flash);
        this._flashEl = flash;
      },
      tick: function (t, dt) {
        this._elapsed += dt * 0.001;
        if (this._elapsed >= this._next) {
          this._elapsed = 0;
          this._next = this.data.nextFireMin +
            Math.random() * (this.data.nextFireMax - this.data.nextFireMin);
          this._burst();
        }
      },
      _burst: function () {
        var shots = Math.floor(
          this.data.burstMin + Math.random() *
          (this.data.burstMax - this.data.burstMin + 1)
        );
        var self = this;
        for (var i = 0; i < shots; i++) {
          var delay = i * (this.data.shotInterval + (Math.random() - 0.5) * 80);
          setTimeout(function () { self._fire(); }, delay);
        }
      },
      _fire: function () {
        this._muzzleFlash();
        this._pop();
      },
      _muzzleFlash: function () {
        var mesh = this._flashEl.getObject3D('mesh');
        if (!mesh || !mesh.material) return;
        // Bright peak, wider dim tail, cleanup
        mesh.material.opacity = 1.0;
        this._flashEl.object3D.scale.set(1, 1, 1);
        var el = this._flashEl;
        setTimeout(function () {
          if (!mesh.material) return;
          mesh.material.opacity = 0.55;
          el.object3D.scale.set(1.8, 1.8, 1.8);
        }, 35);
        setTimeout(function () {
          if (mesh.material) mesh.material.opacity = 0;
          el.object3D.scale.set(1, 1, 1);
        }, 150);
      },
      _pop: function () {
        try {
          var ctx = AFRAME.THREE.AudioContext.getContext();
          if (!ctx || ctx.state === 'suspended') return;
          var duration = 0.22;
          var bufferSize = Math.floor(ctx.sampleRate * duration);
          var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          var data = buffer.getChannelData(0);
          // White noise with fast cubic decay envelope → sharp crack
          for (var i = 0; i < bufferSize; i++) {
            var env = Math.pow(1 - i / bufferSize, 3);
            data[i] = (Math.random() * 2 - 1) * env;
          }
          var src = ctx.createBufferSource();
          src.buffer = buffer;
          // Bandpass around 350 Hz → "thud-crack" AA signature (lower Q = broader)
          var filter = ctx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.value = 350 + Math.random() * 120;
          filter.Q.value = 0.7;
          var gain = ctx.createGain();
          gain.gain.setValueAtTime(this.data.popVolume, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
          src.connect(filter);
          filter.connect(gain);
          // Pan by direction from camera — stereo only, HRTF via A-Frame's
          // listener would be ideal but avoids listener setup overhead here.
          var cam = document.getElementById('cam');
          var camPos = new THREE.Vector3();
          var srcPos = new THREE.Vector3();
          if (cam) cam.object3D.getWorldPosition(camPos);
          this.el.object3D.getWorldPosition(srcPos);
          var dx = srcPos.x - camPos.x;
          var dz = srcPos.z - camPos.z;
          var horiz = Math.sqrt(dx*dx + dz*dz);
          var pan = horiz > 0.01 ? Math.max(-1, Math.min(1, dx / horiz)) : 0;
          var panner = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
          if (panner) {
            panner.pan.value = pan;
            gain.connect(panner);
            panner.connect(ctx.destination);
          } else {
            gain.connect(ctx.destination);
          }
          src.start(ctx.currentTime);
          src.stop(ctx.currentTime + duration);
        } catch(e) { console.warn('[aa-pop]', e); }
      }
    });

    // ── Sky target — single global driver that stands in for an enemy bomber.
    //    Emits a world-space position on window.__BLITZ_TARGET; toggles active
    //    on a slow cycle. searchlight-sweep components read this when they
    //    transition to the acquiring/tracking states. No mesh, no light —
    //    just a parametric crossing path at ~500m altitude, ~90 m/s.         ─
    AFRAME.registerComponent('sky-target', {
      schema: {
        altitude:     { default: 500 },   // metres
        speed:        { default: 90 },    // m/s (Heinkel 111 cruise)
        activeMin:    { default: 25 },    // seconds per crossing
        activeMax:    { default: 40 },
        inactiveMin:  { default: 15 },
        inactiveMax:  { default: 35 }
      },
      init: function () {
        this._state = 'inactive';
        this._t = 0;
        this._dur = this._rand(this.data.inactiveMin, this.data.inactiveMax);
        this._startNewCrossing();
        window.__BLITZ_TARGET = {
          pos: new THREE.Vector3(0, this.data.altitude, 0),
          active: false
        };
      },
      _rand: function (a, b) { return a + Math.random() * (b - a); },
      _startNewCrossing: function () {
        // Pick a random horizontal crossing path across the scene.
        // Origin line tangent (passes "over" origin), length ≈ speed*duration.
        var headingDeg = Math.random() * 360;
        var dur = this._rand(this.data.activeMin, this.data.activeMax);
        var dist = this.data.speed * dur;
        var rad = headingDeg * Math.PI / 180;
        // Perpendicular offset so target doesn't always pass dead centre
        var offset = (Math.random() - 0.5) * 300;
        var dx = Math.cos(rad), dz = Math.sin(rad);
        // Start/end points: walk back half dist along heading, end half forward
        var px = -Math.sin(rad) * offset;
        var pz =  Math.cos(rad) * offset;
        this._start = new THREE.Vector3(px - dx * dist * 0.5, this.data.altitude, pz - dz * dist * 0.5);
        this._end   = new THREE.Vector3(px + dx * dist * 0.5, this.data.altitude, pz + dz * dist * 0.5);
        this._dur = dur;
      },
      tick: function (time, dt) {
        var dts = Math.min(0.1, dt * 0.001);
        this._t += dts;
        var tgt = window.__BLITZ_TARGET;
        if (this._state === 'inactive') {
          tgt.active = false;
          if (this._t >= this._dur) {
            this._state = 'active';
            this._t = 0;
            this._startNewCrossing();
          }
        } else {
          // active: lerp start → end over this._dur seconds
          var u = Math.min(1, this._t / this._dur);
          tgt.pos.lerpVectors(this._start, this._end, u);
          tgt.active = true;
          if (u >= 1) {
            this._state = 'inactive';
            this._t = 0;
            this._dur = this._rand(this.data.inactiveMin, this.data.inactiveMax);
          }
        }
      }
    });

    // ── Searchlight sweep — procedural yaw/pitch driver for AA searchlights.
    //    Real Blitz searchlight crews hunted in organic sweeping patterns —
    //    not symmetric metronomes. Two sines mixed at irrational frequency
    //    ratio (phi, sqrt(2)) give a non-repeating wander. Occasional pauses
    //    (hold) mimic operators briefly locking on a suspected contact.
    //    When a sky-target is active, lights in a groupId may acquire the
    //    target together ("coning"), track it for ~8-15s, then return to
    //    hunt. This is the climactic moment in Blitz footage.              ──
    // Shared group bookkeeping for coning. When a light in a group acquires,
    // it stamps the group with the target snapshot + a time window during
    // which other members have elevated acquire chance (staggered cone-on).
    window.__BLITZ_SL_GROUPS = window.__BLITZ_SL_GROUPS || {};

    AFRAME.registerComponent('searchlight-sweep', {
      schema: {
        yawAmp:        { default: 40 },
        yawCenter:     { default: 0 },
        yawSpeed:      { default: 0.035 },   // halved: lazier hunt
        pitchAmp:      { default: 10 },
        pitchCenter:   { default: -5 },      // tiny forward lean; cone geom already aims +Y
        pitchSpeed:    { default: 0.065 },   // halved
        phase:         { default: 0 },
        holdChance:    { default: 0.002 },
        groupId:       { default: '' },      // empty = solo, no coning
        acquireChance: { default: 0.0025 },  // per-tick chance to lock (when target active)
        distant:       { default: false }    // throttle to every 3rd frame for far lights
      },
      init: function () {
        this._t = this.data.phase * 50 + Math.random() * 20;
        this._hold = 0;
        this._state = 'hunt';                // hunt | acquiring | tracking | losing
        this._stateT = 0;
        this._stateDur = 0;
        this._lerpFromYaw = 0; this._lerpFromPitch = 0;
        this._tmpVec = new THREE.Vector3();
        this._worldPos = new THREE.Vector3();
        // Use YXZ rotation order so that yaw (Y) actually swings the cone's
        // +Y aim horizontally. With default XYZ, Ry has no effect on the
        // +Y axis — yaw would only spin the cone about its own centreline.
        this.el.object3D.rotation.order = 'YXZ';
      },
      _setState: function (next, dur) {
        this._state = next;
        this._stateT = 0;
        this._stateDur = dur;
        this.el.emit('searchlight-state-changed', { state: next }, true);
      },
      _huntAngles: function () {
        // Existing two-sine wobble. Separated out so we can drive it while
        // also using its output as the "return home" target for losing state.
        var yT = this._t * this.data.yawSpeed;
        var pT = this._t * this.data.pitchSpeed;
        var yaw = this.data.yawCenter + this.data.yawAmp * (
          0.62 * Math.sin(yT * Math.PI * 2) +
          0.38 * Math.sin(yT * Math.PI * 2 * 1.61803)
        );
        var pitch = this.data.pitchCenter + this.data.pitchAmp * (
          0.70 * Math.sin(pT * Math.PI * 2) +
          0.30 * Math.sin(pT * Math.PI * 2 * 2.41421)
        );
        return { yaw: yaw, pitch: pitch };
      },
      _aimAt: function (worldTargetPos) {
        // With rotation.order = 'YXZ', applying the sweep entity's rotation
        // to its local +Y (the cone's axis) produces world direction:
        //   d = ( sin θx · sin θy,  cos θx,  sin θx · cos θy )
        // We want d to point from this entity toward worldTargetPos (expressed
        // in the entity's parent frame since rotation acts in parent space).
        this.el.object3D.parent.getWorldPosition(this._worldPos);
        var localTgt = this._tmpVec.copy(worldTargetPos).sub(this._worldPos).normalize();
        var dx = localTgt.x, dy = localTgt.y, dz = localTgt.z;
        var horiz = Math.sqrt(dx*dx + dz*dz);
        // Choose the sin θx < 0 branch so yaw stays near the intuitive value
        // for forward targets (forward = yaw ≈ 0, pitch ≈ −asin(horiz)).
        // That matches the existing "negative pitch = forward lean" convention.
        var pitchDeg = -Math.asin(horiz) * 180 / Math.PI;  // ∈ [−90°, 0°]
        // sin θx = -horiz, so: sin θy = dx / sin θx = -dx / horiz;
        // cos θy = dz / sin θx = -dz / horiz.
        var yawDeg = horiz > 1e-6
          ? Math.atan2(-dx, -dz) * 180 / Math.PI
          : this.data.yawCenter;
        return { yaw: yawDeg, pitch: pitchDeg };
      },
      _tryAcquire: function () {
        var tgt = window.__BLITZ_TARGET;
        if (!tgt || !tgt.active) return false;
        var gid = this.data.groupId;
        var now = performance.now();
        // Group coning: if another member in my group just acquired, I get a
        // big acquire-chance boost for a short window.
        var boost = 1;
        if (gid) {
          var g = window.__BLITZ_SL_GROUPS[gid];
          if (g && now - g.stampMs < 1500 && g.sourceId !== this.el) {
            boost = 140; // ~0.35 per-tick effective chance — usually fires within a few frames
          }
        }
        if (Math.random() < this.data.acquireChance * boost) {
          if (gid) {
            window.__BLITZ_SL_GROUPS[gid] = { stampMs: now, sourceId: this.el };
          }
          // Begin acquiring
          var cur = this._huntAngles();
          this._lerpFromYaw = cur.yaw;
          this._lerpFromPitch = cur.pitch;
          this._setState('acquiring', 1.5);
          return true;
        }
        return false;
      },
      tick: function (time, dt) {
        this._tickFrame = (this._tickFrame || 0) + 1;
        if (this.data.distant && this._tickFrame % 3 !== 0) return;
        var dtS = Math.min(0.05, dt * 0.001);
        var r = this.el.object3D.rotation;
        var yaw, pitch;

        if (this._state === 'hunt') {
          if (this._hold > 0) { this._hold -= dtS; return; }
          if (Math.random() < this.data.holdChance) {
            this._hold = 1.5 + Math.random() * 2.5;
          }
          this._t += dtS;
          var a = this._huntAngles();
          yaw = a.yaw; pitch = a.pitch;
          this._lastHuntYaw = yaw;
          this._lastHuntPitch = pitch;
          // Consider acquiring the sky target
          this._tryAcquire();
        } else if (this._state === 'acquiring') {
          this._stateT += dtS;
          var u = Math.min(1, this._stateT / this._stateDur);
          var uE = u * u * (3 - 2 * u);
          var aim = this._aimAt(window.__BLITZ_TARGET.pos);
          // Wrap yaw delta into [-180, 180] so we take the short way around
          var dyaw = ((aim.yaw - this._lerpFromYaw + 540) % 360) - 180;
          yaw = this._lerpFromYaw + dyaw * uE;
          pitch = this._lerpFromPitch + (aim.pitch - this._lerpFromPitch) * uE;
          if (u >= 1) {
            this._setState('tracking', 8 + Math.random() * 7);
          }
        } else if (this._state === 'tracking') {
          this._stateT += dtS;
          // Aim directly at target with small jitter
          var aim2 = this._aimAt(window.__BLITZ_TARGET.pos);
          var jitterY = Math.sin(time * 0.004 + this.data.phase * 17) * 0.9;
          var jitterP = Math.sin(time * 0.0031 + this.data.phase * 31) * 0.6;
          yaw = aim2.yaw + jitterY;
          pitch = aim2.pitch + jitterP;
          if (this._stateT >= this._stateDur || !window.__BLITZ_TARGET.active) {
            this._lerpFromYaw = yaw;
            this._lerpFromPitch = pitch;
            this._setState('losing', 3);
          }
        } else if (this._state === 'losing') {
          this._stateT += dtS;
          var uL = Math.min(1, this._stateT / this._stateDur);
          var uLE = uL * uL * (3 - 2 * uL);
          this._t += dtS;
          var huntA = this._huntAngles();
          var dyawL = ((huntA.yaw - this._lerpFromYaw + 540) % 360) - 180;
          yaw = this._lerpFromYaw + dyawL * uLE;
          pitch = this._lerpFromPitch + (huntA.pitch - this._lerpFromPitch) * uLE;
          if (uL >= 1) {
            this._setState('hunt', 0);
          }
        }

        r.x = THREE.MathUtils.degToRad(pitch);
        r.y = THREE.MathUtils.degToRad(yaw);
        r.z = 0;
      }
    });

    // ── Arc flicker — subtle ~20Hz opacity jitter mimicking carbon-arc
    //    unsteadiness. Much gentler than torch-flicker (±4% vs ±35%),
    //    because arc lamps are intense but stable — not flame-like.
    //    Listens for searchlight-state-changed on the parent sweep entity:
    //    while tracking, beam opacity is boosted (reads as "locked on") and
    //    flicker amplitude is halved (locked beams appear steadier on film). ─
    AFRAME.registerComponent('arc-flicker', {
      schema: {
        base:      { default: 0.18 },
        amplitude: { default: 0.04 },
        speed:     { default: 22 }
      },
      init: function () {
        this._t = Math.random() * 100;
        this._mesh = null;
        this._lockMul = 1;      // current opacity multiplier (eased toward target)
        this._lockTarget = 1;   // target multiplier: 1.35 tracking, 1.0 otherwise
        this._ampMul = 1;
        this._ampTarget = 1;
        var self = this;
        // Walk up to the nearest ancestor that fires searchlight-state-changed.
        var p = this.el.parentNode;
        while (p && p.emit && !p.components['searchlight-sweep']) p = p.parentNode;
        this._sweepEl = p;
        if (this._sweepEl && this._sweepEl.addEventListener) {
          this._sweepEl.addEventListener('searchlight-state-changed', function (e) {
            var s = e.detail && e.detail.state;
            if (s === 'tracking') { self._lockTarget = 1.35; self._ampTarget = 0.5; }
            else                  { self._lockTarget = 1.0;  self._ampTarget = 1.0; }
          });
        }
      },
      tick: function (time, dt) {
        this._frame = (this._frame || 0) + 1;
        if (this._frame % 7 !== 0) return;
        if (!this._mesh) this._mesh = this.el.getObject3D('mesh');
        if (!this._mesh || !this._mesh.material) return;
        var dts = dt * 0.001;
        // Smooth ease toward target over ~200ms
        var k = Math.min(1, dts / 0.2);
        this._lockMul += (this._lockTarget - this._lockMul) * k;
        this._ampMul  += (this._ampTarget  - this._ampMul)  * k;
        this._t += dts * this.data.speed;
        var j = 0.68 * Math.sin(this._t) +
                0.22 * Math.sin(this._t * 3.17) +
                0.10 * (Math.random() - 0.5) * 2;
        this._mesh.material.opacity = Math.max(
          0,
          this.data.base * this._lockMul + this.data.amplitude * this._ampMul * j
        );
      }
    });

    // ── Raycaster warm-up — first raycast into a big Draco scene is slow;
    //    do a dummy one on scene-loaded so the first real point doesn't freeze ──
    AFRAME.registerComponent('raycaster-warmup', {
      init: function () {
        var self = this;
        this.el.addEventListener('loaded', function () {
          var sceneEl = document.querySelector('[gltf-model="#scene-glb"]');
          if (!sceneEl) return;
          sceneEl.addEventListener('model-loaded', function () {
            try {
              var rc = new THREE.Raycaster();
              rc.far = 30;
              rc.set(new THREE.Vector3(0, 1.6, 0), new THREE.Vector3(0, 0, -1));
              rc.intersectObject(sceneEl.object3D, true);
            } catch(e) { console.warn('[warmup]', e); }
          });
        });
      }
    });
  </script>
</head>
<body>

<a-scene
  draco-loader
  raycaster-warmup
  distant-explosions
  sky-target
  coord-readout
  fog="type: linear; color: #070c18; near: 8; far: 32"
  renderer="colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 0.28; foveation: 1"
  background="color: #070c18"
  vr-mode-ui="enabled: true"
  loading-screen="dotsColor: #ffee88; backgroundColor: #000">

  <a-assets timeout="300000">
    <a-asset-item id="scene-glb" src="a_night_in_the_blitz_25.glb"></a-asset-item>
    <a-asset-item id="torch-glb" src="torch.glb"></a-asset-item>
  </a-assets>

  <!-- Scene -->
  <a-entity gltf-model="#scene-glb" scene-materials-fix position="0 0 0" scale="1 1 1"></a-entity>

  <!-- Sky — dark blue night, moonlit rather than pitch black -->
  <a-sky color="#070c18"></a-sky>

  <!-- Moon — emissive sphere (looks round from any angle) + two soft halos
       via billboarded circles pointed at the camera via sprite-like flat
       shader. The layered sizes/opacities give a gradient glow falloff. -->
  <a-entity id="moon" position="66 48 -80" no-fog>
    <a-sphere radius="3.2" segments-width="32" segments-height="24"
      material="shader:flat; color:#fffaea; fog:false"></a-sphere>
    <a-sphere radius="5.5" segments-width="24" segments-height="18"
      material="shader:flat; color:#e6ebff; opacity:0.22; transparent:true; fog:false; depthWrite:false; side:back"></a-sphere>
    <a-sphere radius="9" segments-width="24" segments-height="18"
      material="shader:flat; color:#8aa0d8; opacity:0.09; transparent:true; fog:false; depthWrite:false; side:back"></a-sphere>
  </a-entity>

  <!-- ── Barrage Balloons — silver WWII fabric blimps, moonlit, no self-glow.
       Built by the `barrage-balloon` component: cigar body, dorsal ballonet
       bulge, rounded nose cap, three tapered tail fins, pendant rigging band
       and taut mooring cable. Positions + drift animations vary per balloon. -->

  <a-entity id="balloon-1" position="3 15 -18" no-fog
    barrage-balloon="length: 6; diameter: 2; cableHeight: 15; color: #7a8e9a; finColor: #5a6e7a"
    animation="property:position; from:3 15 -18; to:3 16.2 -18; dur:9000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 -4; to:0 25 4; dur:38000; dir:alternate; loop:true; easing:linear">
  </a-entity>

  <a-entity id="balloon-2" position="-2 20 -28" no-fog
    barrage-balloon="length: 7; diameter: 2.2; cableHeight: 20; color: #788a96; finColor: #586878"
    animation="property:position; from:-2 20 -28; to:-2 21.5 -28; dur:11000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 3; to:0 -30 -3; dur:44000; dir:alternate; loop:true; easing:linear">
  </a-entity>

  <a-entity id="balloon-3" position="11 17 -22" no-fog
    barrage-balloon="length: 6.5; diameter: 2.1; cableHeight: 17; color: #7c8e9c; finColor: #5c6c7c"
    animation="property:position; from:11 17 -22; to:11 18.5 -22; dur:8500; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 -6; to:0 20 5; dur:32000; dir:alternate; loop:true; easing:linear">
  </a-entity>

  <a-entity id="balloon-4" position="18 22 -12" no-fog
    barrage-balloon="length: 5.8; diameter: 2; cableHeight: 0; color: #7a8c98; finColor: #5a6a78"
    animation="property:position; from:18 22 -12; to:18 23.5 -12; dur:13000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 4; to:0 -18 -4; dur:50000; dir:alternate; loop:true; easing:linear">
  </a-entity>

  <a-entity id="balloon-5" position="-6 16 -10" no-fog
    barrage-balloon="length: 6.2; diameter: 2; cableHeight: 16; color: #788c9a; finColor: #586878"
    animation="property:position; from:-6 16 -10; to:-6 17.2 -10; dur:10000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 -3; to:0 35 3; dur:42000; dir:alternate; loop:true; easing:linear">
  </a-entity>

  <!-- ── Searchlights — 8 AA pencil beams (WWII 150cm carbon-arc lamps).
       Real beams were narrow (~1° divergence), intense at the source, and
       visible only via atmospheric scatter. Each light here is a 3-shell
       tapered cone:
         • hot core — nearly cylindrical, warm-white, high opacity, subtle flicker
         • beam body — slightly wider, softer, flicker-linked
         • outer haze — wider cool-blue atmospheric scatter, low opacity
       At the base: an arc-lamp sphere (intense point) wrapped in a bloom
       halo shell so it reads as a light source, not a grey ball.
       Movement is procedural (searchlight-sweep component): two sines at
       irrational freq ratio + occasional hold = organic, non-repeating
       sweep that mimics operators hunting for aircraft.
       No real point/spot lights — keeps Quest's 3-spot budget for the torch
       and streetlamps. ─────────────────────────────────────────────────── -->
  <a-entity id="searchlights">

    <!-- SL1 — close NW, rooftop height, wide lazy sweep -->
    <a-entity position="-22 14 -28">
      <!-- Arc-lamp housing: bright core + halo + short glow ring -->
      <a-sphere radius="0.22" no-fog
        material="shader:flat; color:#fff6dc; fog:false"></a-sphere>
      <a-sphere radius="0.55" no-fog
        material="shader:flat; color:#fff0bc; opacity:0.35; transparent:true; fog:false; depthWrite:false; side:back"></a-sphere>
      <!-- Beam assembly — pivots around base, sweep driver rotates this -->
      <a-entity searchlight-sweep="yawCenter: -20; yawAmp: 45; yawSpeed: 0.035; pitchCenter: -8; pitchAmp: 16; pitchSpeed: 0.055; phase: 0.13; groupId: A">
        <!-- hot core: radiusBottom 0.3 → radiusTop 1.8 over 260m ≈ 0.3° half-angle -->
        <a-entity geometry="primitive:cone; height:260; radiusBottom:0.3; radiusTop:1.8; segmentsRadial:8; openEnded:true"
          material="color:#fff4dc; opacity:0.22; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.22; amplitude: 0.05; speed: 22"></a-entity>
        <!-- beam body: softer, slightly wider -->
        <a-entity geometry="primitive:cone; height:260; radiusBottom:0.55; radiusTop:3.2; segmentsRadial:8; openEnded:true"
          material="color:#f8eac0; opacity:0.12; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.12; amplitude: 0.03; speed: 17"></a-entity>
        <!-- outer haze: wide cool scatter -->
        <a-entity geometry="primitive:cone; height:260; radiusBottom:1.2; radiusTop:6.5; segmentsRadial:8; openEnded:true"
          material="color:#b8cbff; opacity:0.06; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.06; amplitude: 0.02; speed: 12"></a-entity>
      </a-entity>
    </a-entity>

    <!-- SL2 — close N, tight pitched sweep -->
    <a-entity position="6 15 -34">
      <a-sphere radius="0.22" no-fog
        material="shader:flat; color:#fff6dc; fog:false"></a-sphere>
      <a-sphere radius="0.55" no-fog
        material="shader:flat; color:#fff0bc; opacity:0.35; transparent:true; fog:false; depthWrite:false; side:back"></a-sphere>
      <a-entity searchlight-sweep="yawCenter: 8; yawAmp: 30; yawSpeed: 0.045; pitchCenter: -3; pitchAmp: 14; pitchSpeed: 0.09; phase: 0.41; groupId: A">
        <a-entity geometry="primitive:cone; height:260; radiusBottom:0.28; radiusTop:1.6; segmentsRadial:8; openEnded:true"
          material="color:#fff4dc; opacity:0.22; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.22; amplitude: 0.05; speed: 24"></a-entity>
        <a-entity geometry="primitive:cone; height:260; radiusBottom:0.5; radiusTop:3.0; segmentsRadial:8; openEnded:true"
          material="color:#f8eac0; opacity:0.12; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.12; amplitude: 0.03; speed: 19"></a-entity>
        <a-entity geometry="primitive:cone; height:260; radiusBottom:1.1; radiusTop:6.0; segmentsRadial:8; openEnded:true"
          material="color:#b8cbff; opacity:0.06; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.06; amplitude: 0.02; speed: 14"></a-entity>
      </a-entity>
    </a-entity>

    <!-- SL3 — close NE, slightly higher rooftop -->
    <a-entity position="26 16 -32">
      <a-sphere radius="0.22" no-fog
        material="shader:flat; color:#fff6dc; fog:false"></a-sphere>
      <a-sphere radius="0.55" no-fog
        material="shader:flat; color:#fff0bc; opacity:0.35; transparent:true; fog:false; depthWrite:false; side:back"></a-sphere>
      <a-entity searchlight-sweep="yawCenter: 25; yawAmp: 35; yawSpeed: 0.03; pitchCenter: -6; pitchAmp: 18; pitchSpeed: 0.065; phase: 0.76; groupId: B">
        <a-entity geometry="primitive:cone; height:260; radiusBottom:0.3; radiusTop:1.9; segmentsRadial:8; openEnded:true"
          material="color:#fff4dc; opacity:0.22; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.22; amplitude: 0.05; speed: 20"></a-entity>
        <a-entity geometry="primitive:cone; height:260; radiusBottom:0.55; radiusTop:3.4; segmentsRadial:8; openEnded:true"
          material="color:#f8eac0; opacity:0.12; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.12; amplitude: 0.03; speed: 16"></a-entity>
        <a-entity geometry="primitive:cone; height:260; radiusBottom:1.2; radiusTop:6.8; segmentsRadial:8; openEnded:true"
          material="color:#b8cbff; opacity:0.06; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.06; amplitude: 0.02; speed: 11"></a-entity>
      </a-entity>
    </a-entity>

    <!-- SL4 — behind player (S), close -->
    <a-entity position="-10 15 32">
      <a-sphere radius="0.22" no-fog
        material="shader:flat; color:#fff6dc; fog:false"></a-sphere>
      <a-sphere radius="0.55" no-fog
        material="shader:flat; color:#fff0bc; opacity:0.35; transparent:true; fog:false; depthWrite:false; side:back"></a-sphere>
      <a-entity searchlight-sweep="yawCenter: 180; yawAmp: 40; yawSpeed: 0.038; pitchCenter: -4; pitchAmp: 15; pitchSpeed: 0.08; phase: 0.28; groupId: B">
        <a-entity geometry="primitive:cone; height:260; radiusBottom:0.3; radiusTop:1.7; segmentsRadial:8; openEnded:true"
          material="color:#fff4dc; opacity:0.22; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.22; amplitude: 0.05; speed: 23"></a-entity>
        <a-entity geometry="primitive:cone; height:260; radiusBottom:0.55; radiusTop:3.1; segmentsRadial:8; openEnded:true"
          material="color:#f8eac0; opacity:0.12; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.12; amplitude: 0.03; speed: 18"></a-entity>
        <a-entity geometry="primitive:cone; height:260; radiusBottom:1.2; radiusTop:6.2; segmentsRadial:8; openEnded:true"
          material="color:#b8cbff; opacity:0.06; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 130 0"
          arc-flicker="base: 0.06; amplitude: 0.02; speed: 13"></a-entity>
      </a-entity>
    </a-entity>

    <!-- SL5 — distant NW (120m out), only beam visible above horizon.
         Base arc lamp is invisibly small at this range; beam is what reads. -->
    <a-entity position="-95 15 -140">
      <a-sphere radius="0.3" no-fog
        material="shader:flat; color:#fff6dc; fog:false"></a-sphere>
      <a-entity searchlight-sweep="yawCenter: 30; yawAmp: 55; yawSpeed: 0.025; pitchCenter: -12; pitchAmp: 12; pitchSpeed: 0.045; phase: 0.55; distant: true">
        <a-entity geometry="primitive:cone; height:340; radiusBottom:0.5; radiusTop:3.5; segmentsRadial:8; openEnded:true"
          material="color:#fff4dc; opacity:0.20; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 170 0"
          arc-flicker="base: 0.20; amplitude: 0.04; speed: 19"></a-entity>
        <a-entity geometry="primitive:cone; height:340; radiusBottom:1.6; radiusTop:8; segmentsRadial:8; openEnded:true"
          material="color:#b8cbff; opacity:0.07; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 170 0"
          arc-flicker="base: 0.07; amplitude: 0.02; speed: 10"></a-entity>
      </a-entity>
    </a-entity>

    <!-- SL6 — distant N -->
    <a-entity position="10 12 -180">
      <a-sphere radius="0.3" no-fog
        material="shader:flat; color:#fff6dc; fog:false"></a-sphere>
      <a-entity searchlight-sweep="yawCenter: -10; yawAmp: 50; yawSpeed: 0.03; pitchCenter: -10; pitchAmp: 10; pitchSpeed: 0.06; phase: 0.09; distant: true">
        <a-entity geometry="primitive:cone; height:340; radiusBottom:0.5; radiusTop:3.8; segmentsRadial:8; openEnded:true"
          material="color:#fff4dc; opacity:0.20; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 170 0"
          arc-flicker="base: 0.20; amplitude: 0.04; speed: 21"></a-entity>
        <a-entity geometry="primitive:cone; height:340; radiusBottom:1.6; radiusTop:8; segmentsRadial:8; openEnded:true"
          material="color:#b8cbff; opacity:0.07; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 170 0"
          arc-flicker="base: 0.07; amplitude: 0.02; speed: 12"></a-entity>
      </a-entity>
    </a-entity>

    <!-- SL7 — distant NE -->
    <a-entity position="110 13 -150">
      <a-sphere radius="0.3" no-fog
        material="shader:flat; color:#fff6dc; fog:false"></a-sphere>
      <a-entity searchlight-sweep="yawCenter: -30; yawAmp: 55; yawSpeed: 0.028; pitchCenter: -12; pitchAmp: 11; pitchSpeed: 0.05; phase: 0.83; distant: true">
        <a-entity geometry="primitive:cone; height:340; radiusBottom:0.5; radiusTop:3.5; segmentsRadial:8; openEnded:true"
          material="color:#fff4dc; opacity:0.20; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 170 0"
          arc-flicker="base: 0.20; amplitude: 0.04; speed: 18"></a-entity>
        <a-entity geometry="primitive:cone; height:340; radiusBottom:1.6; radiusTop:7.5; segmentsRadial:8; openEnded:true"
          material="color:#b8cbff; opacity:0.07; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 170 0"
          arc-flicker="base: 0.07; amplitude: 0.02; speed: 11"></a-entity>
      </a-entity>
    </a-entity>

    <!-- SL8 — distant W -->
    <a-entity position="-140 12 -40">
      <a-sphere radius="0.3" no-fog
        material="shader:flat; color:#fff6dc; fog:false"></a-sphere>
      <a-entity searchlight-sweep="yawCenter: 60; yawAmp: 50; yawSpeed: 0.033; pitchCenter: -10; pitchAmp: 10; pitchSpeed: 0.055; phase: 0.34; distant: true">
        <a-entity geometry="primitive:cone; height:340; radiusBottom:0.5; radiusTop:3.6; segmentsRadial:8; openEnded:true"
          material="color:#fff4dc; opacity:0.20; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 170 0"
          arc-flicker="base: 0.20; amplitude: 0.04; speed: 20"></a-entity>
        <a-entity geometry="primitive:cone; height:340; radiusBottom:1.6; radiusTop:8; segmentsRadial:8; openEnded:true"
          material="color:#b8cbff; opacity:0.07; transparent:true; side:double; shader:flat; depthWrite:false; fog:false"
          no-fog position="0 170 0"
          arc-flicker="base: 0.07; amplitude: 0.02; speed: 13"></a-entity>
      </a-entity>
    </a-entity>

  </a-entity>

  <!-- Lighting -->
  <a-light id="scene-ambient" type="ambient" color="#1e2a42" intensity="0.06"></a-light>
  <!-- Sun — off by default, switched on by day mode panel -->
  <a-light id="sun-light" type="directional" color="#fff8e8" intensity="0" position="-3 10 5"></a-light>
  <!-- Moonlight — cool blue-white directional, from the moon disc's direction -->
  <a-light id="moon-light" type="directional" color="#c8d8ff" intensity="1.1"
           position="66 48 -80"></a-light>
  <!-- Sky-dome fill — hemisphere wash so shadow sides aren't pitch black -->
  <a-entity light="type: hemisphere; color: #8096c8; groundColor: #0a0e18; intensity: 0.55"></a-entity>
  <!-- Blackout lamp lights — spotlights pointing straight down, light only reaches ground -->
  <a-light type="spot" color="#ffaa33" intensity="40" distance="8" decay="2" angle="35" penumbra="0.4"
           position="3.32 3.07 -19.04" target="#lamp-target-1"></a-light>
  <a-entity id="lamp-target-1" position="3.32 0 -19.04"></a-entity>
  <a-light type="spot" color="#ffaa33" intensity="40" distance="8" decay="2" angle="35" penumbra="0.4"
           position="15.36 2.74 -17.77" target="#lamp-target-2"></a-light>
  <a-entity id="lamp-target-2" position="15.36 0 -17.77"></a-entity>

  <!-- Player -->
  <a-entity id="rig" position="0 0 0"
            movement-controls="fly: false; speed: 0.2; camera: #cam"
            smooth-turn="speed: 60">

    <!-- Rain — instanced streaks falling in a cylinder around the player
         DISABLED v55 while isolating a crash-on-open. Re-enable by
         uncommenting the element below once the root cause is confirmed. -->
    <!-- <a-entity rain></a-entity> -->

    <a-entity id="cam" camera look-controls position="0 1.6 0"></a-entity>

    <a-entity oculus-touch-controls="hand: left; model: false" audio-unlock-vr></a-entity>

    <a-entity oculus-touch-controls="hand: right; model: false"
              torch-toggle audio-unlock-vr></a-entity>

    <!-- Torch at rest. Reposition this entity to wherever the torch should sit
         in the scene. On grip within ~0.25 m, torch-pickup reparents its
         object3D onto the right controller at held pose (0 -0.07 0.05, -140 0 0). -->
    <a-entity id="torch" position="0 0.56 -0.8" rotation="-90 0 0" torch-pickup>
      <!-- Moonlight bounce inside torch so it toggles off with it -->
      <a-entity light="type:directional; color:#8899cc; intensity:0.04" position="0.3 1 -0.2"></a-entity>
      <!-- Torch GLB model — matte, responds to torch light, no reflections -->
      <a-entity id="torch-glb-entity" gltf-model="#torch-glb" scale="0.075 0.075 0.075" rotation="-90 0 0" position="0 0 0" matte-darken></a-entity>
      <!-- Bulb glow — at the narrow angled tip (front, +Y) -->
      <a-entity id="torch-glow" position="0 0.055 0">
        <a-sphere radius="0.003" material="shader:standard; color:#ffb866; emissive:#ff7030; emissiveIntensity:3; roughness:0.3"></a-sphere>
        <a-entity light="type:point; color:#ff9900; intensity:0.06; distance:0.4; decay:2"></a-entity>
      </a-entity>
      <!-- Spotlight target — far forward so beam follows hand direction -->
      <a-entity id="torch-beam-target" position="0 20 0"></a-entity>
      <!-- Spotlight beam — directional so it doesn't flood the scene orange -->
      <a-entity id="torch-point" light="type:spot; color:#ffc890; intensity:112; distance:10; decay:2; angle:15; penumbra:0.55; target:#torch-beam-target"
                torch-flicker="base:112; range:25; speed:2.5"
                position="0 0.08 0"></a-entity>
    </a-entity>

  </a-entity>

</a-scene>
<div id="version-overlay">v74</div>

<!-- ── Day/Night panel — desktop only, hidden in VR ─────────────────── -->
<div id="mode-panel" style="
  position:fixed; top:12px; left:12px; z-index:9999;
  background:rgba(0,0,0,0.82); color:#eee; font-family:monospace; font-size:14px;
  padding:16px 20px; border-radius:8px;
  display:block;">
  <b style="color:#ffaa44">A Night in the Blitz</b>
  <div style="margin-top:14px; display:flex; gap:10px;">
    <button id="btn-night" onclick="setNight()" style="
      padding:10px 20px; font-size:14px; cursor:pointer;
      background:#1a2a3a; color:#aaccff; border:2px solid #aaccff; border-radius:6px;">
      Night
    </button>
    <button id="btn-day" onclick="setDay()" style="
      padding:10px 20px; font-size:14px; cursor:pointer;
      background:#2a1a00; color:#ffcc66; border:2px solid #ffcc66; border-radius:6px;">
      Day
    </button>
  </div>
  <div style="margin-top:10px; color:#666; font-size:11px">Hidden when entering VR</div>
</div>
<script>
  document.querySelector('a-scene').addEventListener('enter-vr', function() {
    document.getElementById('mode-panel').style.display = 'none';
  });
  document.querySelector('a-scene').addEventListener('exit-vr', function() {
    document.getElementById('mode-panel').style.display = 'block';
  });

  function _applySceneColors(r, g, b) {
    var sceneGlb = document.querySelector('[gltf-model="#scene-glb"]');
    if (!sceneGlb || !sceneGlb.object3D) return;
    sceneGlb.object3D.traverse(function (node) {
      if (!node.isMesh) return;
      var mats = Array.isArray(node.material) ? node.material : [node.material];
      mats.forEach(function (m) {
        if (!m) return;
        // For textured materials use (r,g,b) as the tint; for flat colours scale the full channel
        if (m.map) {
          m.color.setRGB(r, g, b);
        } else {
          m.color.setRGB(r * 0.9, g * 0.85, b * 0.8);
        }
        m.needsUpdate = true;
      });
    });
  }

  // Set ground PBR: wet cobbles at night, dry matte in day. Identifies ground
  // meshes the same way night-darken does (world-Y top below 0.5m).
  function _applyGroundPBR(roughness, metalness) {
    var sceneGlb = document.querySelector('[gltf-model="#scene-glb"]');
    if (!sceneGlb || !sceneGlb.object3D) return;
    sceneGlb.object3D.updateMatrixWorld(true);
    var top = new THREE.Vector3();
    sceneGlb.object3D.traverse(function (node) {
      if (!node.isMesh || !node.geometry) return;
      if (!node.geometry.boundingBox) node.geometry.computeBoundingBox();
      var bb = node.geometry.boundingBox;
      if (!bb) return;
      top.set(0, bb.max.y, 0).applyMatrix4(node.matrixWorld);
      if (top.y >= 0.5) return;
      var mats = Array.isArray(node.material) ? node.material : [node.material];
      mats.forEach(function (m) {
        if (m && 'roughness' in m) {
          m.roughness = roughness;
          m.metalness = metalness;
          m.needsUpdate = true;
        }
      });
    });
  }

  function _setExposure(val) {
    // setAttribute alone is unreliable in A-Frame 1.5 — hit the renderer directly
    var aScene = document.querySelector('a-scene');
    try { if (aScene.renderer) aScene.renderer.toneMappingExposure = val; } catch(e) {}
    try { aScene.setAttribute('renderer', 'exposure', val); } catch(e) {}
  }

  function setNight() {
    var scene = document.querySelector('a-scene');
    _setExposure(0.28);
    scene.setAttribute('fog', 'type:linear; color:#070c18; near:8; far:32');
    var ambient = document.getElementById('scene-ambient');
    if (ambient) ambient.setAttribute('light', 'color:#1e2a42; intensity:0.45');
    var sun = document.getElementById('sun-light');
    if (sun) sun.setAttribute('light', 'intensity', 0);
    var moon = document.getElementById('moon-light');
    if (moon) moon.setAttribute('light', 'intensity', 1.1);
    var sky = document.querySelector('a-sky');
    if (sky) sky.setAttribute('color', '#070c18');
    scene.setAttribute('background', 'color: #070c18');
    _applySceneColors(0.28, 0.3, 0.38);
    _applyGroundPBR(0.55, 0.1); // wet cobbles
    document.getElementById('btn-night').style.borderColor = '#ffffff';
    document.getElementById('btn-day').style.borderColor = '#ffcc66';
  }

  function setDay() {
    var scene = document.querySelector('a-scene');
    _setExposure(1.5);
    // Push fog well past the scene so nothing hides behind it
    scene.setAttribute('fog', 'type:linear; color:#c8e4f0; near:80; far:200');
    var ambient = document.getElementById('scene-ambient');
    if (ambient) ambient.setAttribute('light', 'color:#ffffff; intensity:4.0');
    var sun = document.getElementById('sun-light');
    if (sun) sun.setAttribute('light', 'color:#fff8e8; intensity:4.0');
    var sky = document.querySelector('a-sky');
    if (sky) sky.setAttribute('color', '#87ceeb');
    scene.setAttribute('background', 'color: #87ceeb');
    _applySceneColors(1.0, 1.0, 1.0);
    _applyGroundPBR(0.9, 0.0); // dry matte in daylight
    document.getElementById('btn-day').style.borderColor = '#ffffff';
    document.getElementById('btn-night').style.borderColor = '#aaccff';
  }

</script>
</body>
</html>
