<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Night in the Blitz — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; }
    #version-overlay {
      position: fixed; bottom: 18px; right: 90px;
      color: #88aacc; font-family: monospace; font-size: 13px;
      opacity: 0.75; pointer-events: none; z-index: 9999; user-select: none;
    }
  </style>

  <script>
    // Configure Draco decoder before any models load
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
        AFRAME.systems['gltf-model'] && AFRAME.systems['gltf-model'].loader &&
          AFRAME.systems['gltf-model'].loader.setDRACOLoader(dracoLoader);
        // Also hook into scene load in case the system isn't ready yet
        document.querySelector('a-scene').addEventListener('loaded', function () {
          try {
            var sys = document.querySelector('a-scene').systems['gltf-model'];
            if (sys && sys.loader) sys.loader.setDRACOLoader(dracoLoader);
          } catch(e) {}
        });
      } catch(e) { console.warn('[draco-setup]', e); }
    });

    // Suppress errors that would kill the Quest WebXR session
    window.addEventListener('unhandledrejection', function (e) {
      e.preventDefault();
      console.warn('[safety] rejection suppressed:', e.reason);
    });
    window.onerror = function (msg, src, line) {
      console.warn('[error]', msg, src + ':' + line);
      return false;
    };

    // ── Night darken — darkens baked GLB textures to blackout levels ─────
    // Also stores dayMats (unlit MeshBasicMaterial) for day mode toggling
    AFRAME.registerComponent('night-darken', {
      init: function () {
        this.el.addEventListener('model-loaded', function (e) {
          try {
            e.detail.model.traverse(function (node) {
              if (!node.isMesh) return;
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              var nightMats = [], dayMats = [];
              mats.forEach(function (mat, i) {
                // Day material — unlit, shows baked colours exactly as exported
                dayMats.push(new THREE.MeshBasicMaterial({
                  map: mat.map,
                  color: mat.map ? new THREE.Color(1,1,1) : mat.color.clone(),
                  side: THREE.DoubleSide,
                  transparent: mat.transparent,
                  opacity: mat.opacity,
                  alphaTest: mat.alphaTest
                }));

                // Night material — kill emissives, darken
                if (mat.emissive) mat.emissive.setRGB(0, 0, 0);
                mat.emissiveIntensity = 0;
                if (mat.lightMap) mat.lightMap = null;
                mat.lightMapIntensity = 0;
                if (mat.envMap) mat.envMap = null;

                if (mat.type === 'MeshBasicMaterial') {
                  if (node.geometry) node.geometry.computeVertexNormals();
                  var col = mat.map ? new THREE.Color(0.35, 0.35, 0.35) : mat.color.clone().multiplyScalar(0.35);
                  var replacement = new THREE.MeshStandardMaterial({
                    map: mat.map, color: col, roughness: 0.9, metalness: 0.0,
                    side: THREE.DoubleSide, transparent: mat.transparent,
                    opacity: mat.opacity, alphaTest: mat.alphaTest
                  });
                  replacement.needsUpdate = true;
                  if (Array.isArray(node.material)) { node.material[i] = replacement; }
                  else { node.material = replacement; }
                  nightMats.push(replacement);
                } else {
                  if (mat.map) { mat.color.setRGB(0.08, 0.08, 0.08); }
                  else { mat.color.setRGB(0.08, 0.08, 0.08); }
                  mat.needsUpdate = true;
                  nightMats.push(mat);
                }
              });
              node.userData.nightMats = nightMats;
              node.userData.dayMats = dayMats;
            });
          } catch(err) { console.warn('night-darken error:', err); }
        });
      }
    });

    // ── Torch flicker — random light intensity variation ──────────────────
    AFRAME.registerComponent('torch-flicker', {
      schema: { base: {default: 0.9}, range: {default: 0.35}, speed: {default: 8} },
      init: function () { this._t = 0; this._target = 1; this._cur = 1; },
      tick: function (t, dt) {
        this._t += dt * 0.001 * this.data.speed;
        if (this._t >= 1) {
          this._t = 0;
          this._target = this.data.base + (Math.random() - 0.5) * this.data.range * 2;
        }
        this._cur += (this._target - this._cur) * Math.min(1, dt * 0.012);
        this.el.setAttribute('light', 'intensity', Math.max(0, this._cur));
      }
    });

    // ── Smooth turn — right thumbstick, continuous rotation ───────────────
    AFRAME.registerComponent('smooth-turn', {
      schema: { speed: {default: 60} },
      init: function () {
        this._stickX = 0;
        var self = this;
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('thumbstickmoved', function (e) {
            self._stickX = e.detail.x;
          });
          rightCtrl.addEventListener('thumbstickup', function () {
            self._stickX = 0;
          });
        }
        bind();
      },
      tick: function (t, dt) {
        if (Math.abs(this._stickX) < 0.15) return;
        this.el.object3D.rotation.y -= THREE.MathUtils.degToRad(
          this._stickX * this.data.speed * dt / 1000
        );
      }
    });

    // ── Brightness cycle — right B button cycles through scene presets ───
    AFRAME.registerComponent('brightness-cycle', {
      init: function () {
        var presets = [
          { label:'very dark',  ambient:0.06,  torch:300  },
          { label:'dark',       ambient:0.12,  torch:600  },
          { label:'medium',     ambient:0.25,  torch:1000 },
          { label:'bright',     ambient:0.5,   torch:1750 }
        ];
        var idx = 1; // start on 'dark'
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('bbuttondown', function () {
            try {
              idx = (idx + 1) % presets.length;
              var p = presets[idx];
              var ambient = document.getElementById('scene-ambient');
              if (ambient) ambient.setAttribute('light', 'intensity', p.ambient);
              var torchEl = document.getElementById('torch-point');
              if (torchEl) torchEl.setAttribute('light', 'intensity', p.torch);
              // Short double-buzz so you know it changed
              var gp = rightCtrl.components['oculus-touch-controls'];
              if (gp && gp.controller && gp.controller.hapticActuators && gp.controller.hapticActuators[0]) {
                gp.controller.hapticActuators[0].pulse(0.3, 40);
              }
              console.log('[brightness] preset:', p.label);
            } catch(e) {}
          });
        }
        bind();
      }
    });

    // ── Torch toggle — right A button (beam only, model stays visible) ──────
    AFRAME.registerComponent('torch-toggle', {
      init: function () {
        var _on = true;
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('abuttondown', function () {
            try {
              _on = !_on;
              // Toggle beam and bulb glow only — torch model stays in hand
              var beam = document.getElementById('torch-point');
              var glow = document.getElementById('torch-glow');
              if (beam) beam.setAttribute('visible', _on);
              if (glow) glow.setAttribute('visible', _on);
              // Haptic buzz — short click feel
              var gp = rightCtrl.components['oculus-touch-controls'];
              if (gp && gp.controller && gp.controller.hapticActuators && gp.controller.hapticActuators[0]) {
                gp.controller.hapticActuators[0].pulse(_on ? 0.4 : 0.2, 60);
              }
            } catch(e) {}
          });
        }
        bind();
      }
    });

    // ── Torch raycaster — wall-aware: only triggers audio if no geometry in the way ──
    AFRAME.registerComponent('torch-raycaster', {
      init: function () {
        this._rc = new THREE.Raycaster();
        this._rc.far = 15;
        this._sceneObj = null;
        this._lastCheck = 0;
        var self = this;
        var sceneEl = document.querySelector('[gltf-model="#scene-glb"]');
        if (sceneEl) {
          sceneEl.addEventListener('model-loaded', function () {
            self._sceneObj = sceneEl.object3D;
          });
        }
      },
      tick: function (t) {
        if (t - this._lastCheck < 200) return;
        this._lastCheck = t;
        if (!this._sceneObj) return;
        var pos = new THREE.Vector3();
        var dir = new THREE.Vector3(0, 1, 0);
        this.el.object3D.getWorldPosition(pos);
        dir.transformDirection(this.el.object3D.matrixWorld).normalize();
        this._rc.set(pos, dir);
        var wallHits = this._rc.intersectObject(this._sceneObj, true);
        var wallDist = wallHits.length ? wallHits[0].distance : Infinity;
        var self = this;
        document.querySelectorAll('[audio-trigger]').forEach(function (el) {
          if (!el.object3D) return;
          var hits = self._rc.intersectObject(el.object3D, true);
          if (hits.length && hits[0].distance < wallDist) {
            var c = el.components['audio-trigger'];
            if (c) c.triggerPlay();
          }
        });
      }
    });

    // ── Audio trigger — attach to any scene object; torch beam plays it ──
    AFRAME.registerComponent('audio-trigger', {
      schema: {
        src:  { type: 'string',  default: '' },
        once: { type: 'boolean', default: true }
      },
      init: function () {
        this._played = false;
        this._audio  = this.data.src ? new Audio(this.data.src) : null;
      },
      triggerPlay: function () {
        if (this.data.once && this._played) return;
        this._played = true;
        if (this._audio) {
          this._audio.play().catch(function () {});
        } else {
          this._beep();
        }
      },
      _beep: function () {
        try {
          var ctx = AFRAME.THREE.AudioContext.getContext();
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 520;
          gain.gain.setValueAtTime(0.25, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 1.5);
        } catch (e) { console.warn('[audio-trigger] beep failed:', e); }
      }
    });

    // ── Audio context unlock (Quest requires a user gesture) ──────────────
    ['click','touchstart','touchend'].forEach(function (ev) {
      document.addEventListener(ev, function () {
        try {
          var ctx = AFRAME.THREE.AudioContext.getContext();
          if (ctx && ctx.state === 'suspended') ctx.resume();
        } catch(e) {}
      });
    });
  </script>
</head>
<body>

<a-scene
  draco-loader="decoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.7/"
  fog="type: linear; color: #010306; near: 4; far: 18"
  renderer="colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 0.06"
  background="color: #010306"
  vr-mode-ui="enabled: true"
  loading-screen="dotsColor: #ffee88; backgroundColor: #000">

  <a-assets timeout="120000">
    <a-asset-item id="scene-glb" src="a_night_in_the_blitz_10.glb"></a-asset-item>
    <a-asset-item id="torch-glb" src="torch.glb"></a-asset-item>
  </a-assets>

  <!-- Scene -->
  <a-entity gltf-model="#scene-glb" position="0 0 0" scale="1 1 1" night-darken></a-entity>

<!-- Torch resting on floor at spawn — lying on its side -->
  <a-entity id="scene-torch" gltf-model="#torch-glb"
    position="0.3 0.04 -0.5"
    rotation="0 45 90"
    scale="0.075 0.075 0.075"
    night-darken></a-entity>

  <!-- Sky — solid blackout dark, no horizon texture to break immersion -->
  <a-sky color="#010306"></a-sky>

  <!-- ── Barrage Balloons — silver blimps ~90–130m overhead, slow drift ── -->
  <!-- Moonlight (directional from position 4 10 6) glistens off metalness  -->
  <a-entity id="balloon-1" position="3 92 -18"
    animation="property:position; from:3 92 -18; to:3 94 -18; dur:9000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 -4; to:0 25 4; dur:38000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.2 1 1.1" radius="1"
      material="shader:standard; color:#b0bcc8; metalness:0.65; roughness:0.22; emissive:#8899aa; emissiveIntensity:0.22; side:double"></a-sphere>
    <a-cylinder radius="0.018" height="92" color="#666" position="0 -46 0"
      material="color:#777; opacity:0.35; transparent:true"></a-cylinder>
  </a-entity>

  <a-entity id="balloon-2" position="-2 115 -28"
    animation="property:position; from:-2 115 -28; to:-2 118 -28; dur:11000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 3; to:0 -30 -3; dur:44000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.4 1 1.15" radius="1"
      material="shader:standard; color:#aab8c4; metalness:0.65; roughness:0.2; emissive:#8899aa; emissiveIntensity:0.2; side:double"></a-sphere>
    <a-cylinder radius="0.018" height="115" color="#666" position="0 -57.5 0"
      material="color:#777; opacity:0.3; transparent:true"></a-cylinder>
  </a-entity>

  <a-entity id="balloon-3" position="11 105 -22"
    animation="property:position; from:11 105 -22; to:11 108 -22; dur:8500; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 -6; to:0 20 5; dur:32000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.3 1 1.1" radius="1"
      material="shader:standard; color:#b4c0cc; metalness:0.68; roughness:0.2; emissive:#8899aa; emissiveIntensity:0.22; side:double"></a-sphere>
    <a-cylinder radius="0.018" height="105" color="#666" position="0 -52.5 0"
      material="color:#777; opacity:0.3; transparent:true"></a-cylinder>
  </a-entity>

  <a-entity id="balloon-4" position="18 130 -12"
    animation="property:position; from:18 130 -12; to:18 133 -12; dur:13000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 4; to:0 -18 -4; dur:50000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.1 1 1.05" radius="1"
      material="shader:standard; color:#b8c4d0; metalness:0.62; roughness:0.24; emissive:#8899aa; emissiveIntensity:0.2; side:double"></a-sphere>
  </a-entity>

  <a-entity id="balloon-5" position="-6 100 -10"
    animation="property:position; from:-6 100 -10; to:-6 102 -10; dur:10000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 -3; to:0 35 3; dur:42000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.3 1 1.1" radius="1"
      material="shader:standard; color:#acbac6; metalness:0.67; roughness:0.21; emissive:#8899aa; emissiveIntensity:0.22; side:double"></a-sphere>
    <a-cylinder radius="0.018" height="100" color="#666" position="0 -50 0"
      material="color:#777; opacity:0.3; transparent:true"></a-cylinder>
  </a-entity>

  <!-- ── Audio trigger — invisible zone at Blender (1.9018, 15.302, 1.0607) ── -->
  <!-- transparent material keeps mesh in raycaster scene graph; visible=false would break it -->
  <a-entity position="1.9018 1.0607 -15.302" audio-trigger="src: blitz_audio_test.mp4; once: true"
    geometry="primitive:sphere; radius:0.5"
    material="opacity:0; transparent:true; side:double">
  </a-entity>

  <!-- Lighting -->
  <a-light id="scene-ambient" type="ambient" color="#0a0f1a" intensity="0.12"></a-light>
  <!-- Sun — off by default, switched on by day mode panel -->
  <a-light id="sun-light" type="directional" color="#fff8e8" intensity="0" position="-3 10 5"></a-light>
  <!-- Moonlight — gentle cool blue-white directional from high right behind player -->
  <a-light type="directional" color="#c8d8ff" intensity="0.04"
           position="4 10 6"></a-light>
  <!-- Blackout lamp lights — spotlights pointing straight down, light only reaches ground -->
  <a-light type="spot" color="#ffaa33" intensity="40" distance="8" decay="2" angle="35" penumbra="0.4"
           position="3.32 3.07 -19.04" target="#lamp-target-1"></a-light>
  <a-entity id="lamp-target-1" position="3.32 0 -19.04"></a-entity>
  <a-light type="spot" color="#ffaa33" intensity="40" distance="8" decay="2" angle="35" penumbra="0.4"
           position="15.36 2.74 -17.77" target="#lamp-target-2"></a-light>
  <a-entity id="lamp-target-2" position="15.36 0 -17.77"></a-entity>

  <!-- Player -->
  <a-entity id="rig" position="0 0 0"
            movement-controls="fly: false; speed: 0.2; camera: #cam"
            smooth-turn="speed: 60">

    <a-entity id="cam" camera look-controls position="0 1.6 0"></a-entity>

    <a-entity oculus-touch-controls="hand: left; model: false"></a-entity>

    <a-entity oculus-touch-controls="hand: right; model: false"
              torch-toggle brightness-cycle>
      <!-- Torch model — held in right hand, points forward (-Z) -->
      <!-- down 5cm (-0.07), back 10cm (+0.05 in controller Z = toward player) -->
      <a-entity id="torch" position="0 -0.07 0.05" rotation="-90 0 0">
        <!-- Moonlight bounce inside torch so it toggles off with it -->
        <a-entity light="type:directional; color:#8899cc; intensity:0.04" position="0.3 1 -0.2"></a-entity>
        <!-- Torch GLB model — GLB +Z faces wrapper +Y (forward); angled tip forward -->
        <a-entity gltf-model="#torch-glb" scale="0.075 0.075 0.075" rotation="90 0 0" position="0 0 0" night-darken></a-entity>
        <!-- Bulb glow — at the narrow angled tip (front, +Y) -->
        <a-entity id="torch-glow" position="0 0.055 0">
          <a-sphere radius="0.003" material="shader:standard; color:#ffcc66; emissive:#ffaa33; emissiveIntensity:4; roughness:0.3"></a-sphere>
          <a-entity light="type:point; color:#ff9900; intensity:0.06; distance:0.4; decay:2"></a-entity>
        </a-entity>
        <!-- Spotlight target — far forward so beam follows hand direction -->
        <a-entity id="torch-beam-target" position="0 20 0"></a-entity>
        <!-- Spotlight beam — directional so it doesn't flood the scene orange -->
        <a-entity id="torch-point" light="type:spot; color:#fff5e8; intensity:900; distance:22; decay:2; angle:18; penumbra:0.45; target:#torch-beam-target"
                  torch-flicker="base:900; range:40; speed:3"
                  torch-raycaster
                  position="0 0.08 0"></a-entity>
      </a-entity>
    </a-entity>

  </a-entity>

</a-scene>
<div id="version-overlay">v39</div>

<!-- ── Day/Night panel — desktop only, hidden in VR ─────────────────── -->
<div id="mode-panel" style="
  position:fixed; top:12px; left:12px; z-index:9999;
  background:rgba(0,0,0,0.82); color:#eee; font-family:monospace; font-size:14px;
  padding:16px 20px; border-radius:8px;
  display:block;">
  <b style="color:#ffaa44">A Night in the Blitz</b>
  <div style="margin-top:14px; display:flex; gap:10px;">
    <button id="btn-night" onclick="setNight()" style="
      padding:10px 20px; font-size:14px; cursor:pointer;
      background:#1a2a3a; color:#aaccff; border:2px solid #aaccff; border-radius:6px;">
      Night
    </button>
    <button id="btn-day" onclick="setDay()" style="
      padding:10px 20px; font-size:14px; cursor:pointer;
      background:#2a1a00; color:#ffcc66; border:2px solid #ffcc66; border-radius:6px;">
      Day
    </button>
  </div>
  <div style="margin-top:10px; color:#666; font-size:11px">Hidden when entering VR</div>
</div>
<script>
  document.querySelector('a-scene').addEventListener('enter-vr', function() {
    document.getElementById('mode-panel').style.display = 'none';
  });
  document.querySelector('a-scene').addEventListener('exit-vr', function() {
    document.getElementById('mode-panel').style.display = 'block';
  });

  function setNight() {
    var scene = document.querySelector('a-scene');
    scene.setAttribute('renderer', 'exposure', 0.06);
    scene.setAttribute('fog', 'type:linear; color:#010306; near:4; far:18');
    var ambient = document.getElementById('scene-ambient');
    if (ambient) ambient.setAttribute('light', 'color:#0a0f1a; intensity:0.12');
    var sun = document.getElementById('sun-light');
    if (sun) sun.setAttribute('light', 'intensity', 0);
    var sky = document.querySelector('a-sky');
    if (sky) sky.setAttribute('color', '#010306');
    scene.setAttribute('background', 'color: #010306');
    setNightMaterials();
    document.getElementById('btn-night').style.borderColor = '#ffffff';
    document.getElementById('btn-day').style.borderColor = '#ffcc66';
  }

  function setDay() {
    var scene = document.querySelector('a-scene');
    scene.setAttribute('renderer', 'exposure', 1.0);
    scene.setAttribute('fog', 'type:linear; color:#87ceeb; near:30; far:120');
    var ambient = document.getElementById('scene-ambient');
    if (ambient) ambient.setAttribute('light', 'color:#ffffff; intensity:2.5');
    var sun = document.getElementById('sun-light');
    if (sun) sun.setAttribute('light', 'color:#fff8e8; intensity:2.0');
    var sky = document.querySelector('a-sky');
    if (sky) sky.setAttribute('color', '#87ceeb');
    scene.setAttribute('background', 'color: #87ceeb');
    // Swap to unlit day materials — shows exact baked colours
    var sceneGlb = document.querySelector('[gltf-model="#scene-glb"]');
    if (sceneGlb && sceneGlb.object3D) {
      sceneGlb.object3D.traverse(function (node) {
        if (!node.isMesh || !node.userData.dayMats) return;
        node.material = node.userData.dayMats.length === 1 ? node.userData.dayMats[0] : node.userData.dayMats;
      });
    }
    document.getElementById('btn-day').style.borderColor = '#ffffff';
    document.getElementById('btn-night').style.borderColor = '#aaccff';
  }

  function setNightMaterials() {
    var sceneGlb = document.querySelector('[gltf-model="#scene-glb"]');
    if (sceneGlb && sceneGlb.object3D) {
      sceneGlb.object3D.traverse(function (node) {
        if (!node.isMesh || !node.userData.nightMats) return;
        node.material = node.userData.nightMats.length === 1 ? node.userData.nightMats[0] : node.userData.nightMats;
      });
    }
  }
</script>
</body>
</html>
