<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Night in the Blitz — London, 1940</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; background: #000; }
    #version-overlay {
      position: fixed; bottom: 18px; right: 90px;
      color: #88aacc; font-family: monospace; font-size: 13px;
      opacity: 0.75; pointer-events: none; z-index: 9999; user-select: none;
    }
  </style>

  <script>
    // Configure Draco decoder before any models load
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var dracoLoader = new THREE.DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
        AFRAME.systems['gltf-model'] && AFRAME.systems['gltf-model'].loader &&
          AFRAME.systems['gltf-model'].loader.setDRACOLoader(dracoLoader);
        // Also hook into scene load in case the system isn't ready yet
        document.querySelector('a-scene').addEventListener('loaded', function () {
          try {
            var sys = document.querySelector('a-scene').systems['gltf-model'];
            if (sys && sys.loader) sys.loader.setDRACOLoader(dracoLoader);
          } catch(e) {}
        });
      } catch(e) { console.warn('[draco-setup]', e); }
    });

    // Suppress errors that would kill the Quest WebXR session
    window.addEventListener('unhandledrejection', function (e) {
      e.preventDefault();
      console.warn('[safety] rejection suppressed:', e.reason);
    });
    window.onerror = function (msg, src, line) {
      console.warn('[error]', msg, src + ':' + line);
      return false;
    };

    // ── Night darken — darkens baked GLB textures to blackout levels ─────
    AFRAME.registerComponent('night-darken', {
      init: function () {
        this.el.addEventListener('model-loaded', function (e) {
          try {
            var model = e.detail.model;
            model.updateMatrixWorld(true);
            var topCorner = new THREE.Vector3();
            model.traverse(function (node) {
              if (!node.isMesh) return;
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(function (mat, i) {
                if (mat.emissive) mat.emissive.setRGB(0, 0, 0);
                mat.emissiveIntensity = 0;
                if (mat.lightMap) mat.lightMap = null;
                mat.lightMapIntensity = 0;
                if (mat.envMap) mat.envMap = null;

                if (mat.type === 'MeshBasicMaterial') {
                  if (node.geometry && !node.geometry.attributes.normal) node.geometry.computeVertexNormals();
                  var replacement = new THREE.MeshStandardMaterial({
                    map: mat.map,
                    color: new THREE.Color(0.08, 0.08, 0.08),
                    roughness: 0.9, metalness: 0.0,
                    side: THREE.DoubleSide, transparent: mat.transparent,
                    opacity: mat.opacity, alphaTest: mat.alphaTest
                  });
                  replacement.needsUpdate = true;
                  if (Array.isArray(node.material)) { node.material[i] = replacement; }
                  else { node.material = replacement; }
                } else {
                  mat.color.setRGB(0.08, 0.08, 0.08);
                  mat.needsUpdate = true;
                }
              });

              // Wet-cobble look — meshes whose world-Y top is below ~0.5m
              // get lowered roughness + a touch of metalness so puddled ground
              // picks up torch + streetlamp reflections.
              if (node.geometry) {
                if (!node.geometry.boundingBox) node.geometry.computeBoundingBox();
                var bb = node.geometry.boundingBox;
                if (bb) {
                  topCorner.set(0, bb.max.y, 0).applyMatrix4(node.matrixWorld);
                  if (topCorner.y < 0.5) {
                    var cur = Array.isArray(node.material) ? node.material : [node.material];
                    cur.forEach(function (m) {
                      if (m && 'roughness' in m) {
                        m.roughness = 0.55;
                        m.metalness = 0.1;
                        m.needsUpdate = true;
                      }
                    });
                  }
                }
              }
            });
          } catch(err) { console.warn('night-darken error:', err); }
        });
      }
    });

    // ── Torch flicker — random light intensity variation ──────────────────
    AFRAME.registerComponent('torch-flicker', {
      schema: { base: {default: 0.9}, range: {default: 0.35}, speed: {default: 8} },
      init: function () { this._t = 0; this._target = 1; this._cur = 1; },
      tick: function (t, dt) {
        this._t += dt * 0.001 * this.data.speed;
        if (this._t >= 1) {
          this._t = 0;
          this._target = this.data.base + (Math.random() - 0.5) * this.data.range * 2;
        }
        this._cur += (this._target - this._cur) * Math.min(1, dt * 0.012);
        this.el.setAttribute('light', 'intensity', Math.max(0, this._cur));
      }
    });

    // ── Smooth turn — right thumbstick, continuous rotation ───────────────
    AFRAME.registerComponent('smooth-turn', {
      schema: { speed: {default: 60} },
      init: function () {
        this._stickX = 0;
        var self = this;
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('thumbstickmoved', function (e) {
            self._stickX = e.detail.x;
          });
          rightCtrl.addEventListener('thumbstickup', function () {
            self._stickX = 0;
          });
        }
        bind();
      },
      tick: function (t, dt) {
        if (Math.abs(this._stickX) < 0.15) return;
        this.el.object3D.rotation.y -= THREE.MathUtils.degToRad(
          this._stickX * this.data.speed * dt / 1000
        );
      }
    });

    // ── Brightness cycle — right B button cycles through scene presets ───
    //    Targets torch-flicker.data.base (light.intensity is overwritten
    //    every frame by the flicker tick, so setting it directly is a no-op).
    AFRAME.registerComponent('brightness-cycle', {
      init: function () {
        var presets = [
          { label:'very dark',  ambient:0.06,  torch:150 },
          { label:'dark',       ambient:0.12,  torch:300 },
          { label:'medium',     ambient:0.25,  torch:500 },
          { label:'bright',     ambient:0.5,   torch:800 }
        ];
        var idx = 2; // start on 'medium' — matches current torch base of 500
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('bbuttondown', function () {
            try {
              idx = (idx + 1) % presets.length;
              var p = presets[idx];
              var ambient = document.getElementById('scene-ambient');
              if (ambient) ambient.setAttribute('light', 'intensity', p.ambient);
              var torchEl = document.getElementById('torch-point');
              if (torchEl) {
                var flicker = torchEl.components['torch-flicker'];
                if (flicker) flicker.data.base = p.torch;
              }
              var gp = rightCtrl.components['oculus-touch-controls'];
              if (gp && gp.controller && gp.controller.hapticActuators && gp.controller.hapticActuators[0]) {
                gp.controller.hapticActuators[0].pulse(0.3, 40);
              }
              console.log('[brightness] preset:', p.label);
            } catch(e) {}
          });
        }
        bind();
      }
    });

    // ── Torch toggle — right A button (beam only, model stays visible) ──────
    AFRAME.registerComponent('torch-toggle', {
      init: function () {
        var _on = true;
        function bind() {
          var rightCtrl = document.querySelector('[oculus-touch-controls*="right"]');
          if (!rightCtrl) { setTimeout(bind, 500); return; }
          rightCtrl.addEventListener('abuttondown', function () {
            try {
              _on = !_on;
              // Toggle beam and bulb glow only — torch model stays in hand
              var beam = document.getElementById('torch-point');
              var glow = document.getElementById('torch-glow');
              if (beam) beam.setAttribute('visible', _on);
              if (glow) glow.setAttribute('visible', _on);
              // Haptic buzz — short click feel
              var gp = rightCtrl.components['oculus-touch-controls'];
              if (gp && gp.controller && gp.controller.hapticActuators && gp.controller.hapticActuators[0]) {
                gp.controller.hapticActuators[0].pulse(_on ? 0.4 : 0.2, 60);
              }
            } catch(e) {}
          });
        }
        bind();
      }
    });

    // ── Torch raycaster — A-Frame built-in raycaster (fast), wall-check only on hit ──
    AFRAME.registerComponent('torch-raycaster', {
      init: function () {
        this._rc = new THREE.Raycaster();
        this._rc.far = 15;
        this._sceneObj = null;
        var self = this;
        var sceneEl = document.querySelector('[gltf-model="#scene-glb"]');
        if (sceneEl) {
          sceneEl.addEventListener('model-loaded', function () {
            self._sceneObj = sceneEl.object3D;
          });
        }
        this.el.setAttribute('raycaster', 'direction: 0 1 0; near: 0; far: 15; objects: [audio-trigger]');
        this.el.addEventListener('raycaster-intersection', function (e) {
          e.detail.els.forEach(function (triggerEl) {
            if (self._sceneObj) {
              var pos = new THREE.Vector3();
              var dir = new THREE.Vector3(0, 1, 0);
              self.el.object3D.getWorldPosition(pos);
              dir.transformDirection(self.el.object3D.matrixWorld).normalize();
              self._rc.set(pos, dir);
              var wallHits = self._rc.intersectObject(self._sceneObj, true);
              var wallDist = wallHits.length ? wallHits[0].distance : Infinity;
              var triggerHits = self._rc.intersectObject(triggerEl.object3D, true);
              if (!triggerHits.length || triggerHits[0].distance >= wallDist) return;
            }
            var c = triggerEl.components['audio-trigger'];
            if (c) c.triggerPlay();
          });
        });
      }
    });

    // ── Audio trigger — delegates playback to A-Frame's sound component.
    //    The sound component is configured with positional:true on the
    //    entity, so the playback is spatialised automatically.
    AFRAME.registerComponent('audio-trigger', {
      schema: { once: { type: 'boolean', default: true } },
      init: function () { this._played = false; },
      triggerPlay: function () {
        if (this.data.once && this._played) return;
        var sound = this.el.components.sound;
        if (!sound) return;
        var pool = sound.pool;
        if (!pool || !pool.children.length) return;
        var audio = pool.children[0];
        if (!audio || !audio.buffer) return; // buffer still loading — retry on next raycast
        try {
          sound.stopSound();
          sound.playSound();
          this._played = true;
        } catch(e) { console.warn('[audio-trigger]', e); }
      }
    });

    // ── Matte darken — MeshStandardMaterial roughness:1 metalness:0 (no shine,
    //    but still responds to the torch's own spotlight so it's visible) ──────
    AFRAME.registerComponent('matte-darken', {
      init: function () {
        this.el.addEventListener('model-loaded', function (e) {
          try {
            e.detail.model.traverse(function (node) {
              if (!node.isMesh) return;
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(function (mat, i) {
                var m = new THREE.MeshStandardMaterial({
                  map: mat.map || null,
                  color: new THREE.Color(0.04, 0.04, 0.04),
                  roughness: 0.9,
                  metalness: 0.1,
                  side: THREE.DoubleSide,
                  transparent: mat.transparent || false,
                  opacity: mat.opacity !== undefined ? mat.opacity : 1.0,
                  alphaTest: mat.alphaTest || 0
                });
                if (Array.isArray(node.material)) node.material[i] = m;
                else node.material = m;
              });
            });
          } catch(err) { console.warn('[matte-darken]', err); }
        });
      }
    });

    // ── No fog — tick-based: waits until meshes exist, then disables fog ────
    AFRAME.registerComponent('no-fog', {
      init: function () { this._done = false; },
      tick: function () {
        if (this._done) return;
        var found = false;
        this.el.object3D.traverse(function (n) { if (n.isMesh) found = true; });
        if (!found) return;
        this._done = true;
        this.el.object3D.traverse(function (node) {
          if (!node.isMesh) return;
          var mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.forEach(function (m) { if (m) { m.fog = false; m.needsUpdate = true; } });
        });
      }
    });

    // ── Audio context unlock (Quest requires a user gesture) ──────────────
    function _unlockAudio() {
      try {
        var ctx = AFRAME.THREE.AudioContext.getContext();
        if (ctx && ctx.state === 'suspended') ctx.resume();
      } catch(e) {}
    }
    ['click','touchstart','touchend'].forEach(function (ev) {
      document.addEventListener(ev, _unlockAudio);
    });
    // In VR, click/touch don't fire — unlock on any controller button
    AFRAME.registerComponent('audio-unlock-vr', {
      init: function () {
        var evs = ['abuttondown','bbuttondown','xbuttondown','ybuttondown','triggerdown','gripdown','thumbstickdown'];
        var self = this;
        evs.forEach(function (e) { self.el.addEventListener(e, _unlockAudio); });
      }
    });

    // ── Breath condensation — faint cloudy puff expanding from camera,
    //    pulses every 4.5s. Low-opacity sphere, only reads against the dark.
    AFRAME.registerComponent('breath-puff', {
      init: function () {
        this._t = Math.random() * 3;
        this._period = 4.5;
        this._duration = 1.4;
        this._mesh = null;
      },
      tick: function (t, dt) {
        if (!this._mesh) this._mesh = this.el.getObject3D('mesh');
        if (!this._mesh || !this._mesh.material) return;
        this._t += dt * 0.001;
        var cycle = this._t % this._period;
        if (cycle < this._duration) {
          var p = cycle / this._duration;
          this._mesh.material.opacity = Math.sin(p * Math.PI) * 0.22;
          var s = 0.4 + p * 1.8;
          this.el.object3D.scale.set(s, s, s);
        } else if (this._mesh.material.opacity !== 0) {
          this._mesh.material.opacity = 0;
        }
      }
    });

    // ── Distant explosions — scene-level component.
    //    Every 20–40s: brief directional-light flash + emissive horizon sphere
    //    from a random compass heading, followed 2–3s later by a filtered
    //    noise-burst rumble panned toward that same direction.
    AFRAME.registerComponent('distant-explosions', {
      init: function () {
        this._elapsed = 0;
        this._next = 5 + Math.random() * 10; // first one 5–15s in
      },
      tick: function (t, dt) {
        this._elapsed += dt * 0.001;
        if (this._elapsed >= this._next) {
          this._elapsed = 0;
          this._next = 20 + Math.random() * 20;
          this._fire();
        }
      },
      _fire: function () {
        var angle = Math.random() * Math.PI * 2;
        var dx = Math.cos(angle);
        var dz = Math.sin(angle);

        // Horizon glow — large flat-shaded emissive sphere far away
        var glow = document.createElement('a-entity');
        var gx = dx * 250, gz = dz * 250;
        glow.setAttribute('geometry', 'primitive:sphere; radius:25; segmentsWidth:12; segmentsHeight:8');
        glow.setAttribute('material', 'shader:flat; color:#ff9550; opacity:0; transparent:true; fog:false');
        glow.setAttribute('position', gx + ' 8 ' + gz);
        this.el.appendChild(glow);

        // Directional light pulse from the same azimuth
        var light = document.createElement('a-light');
        light.setAttribute('type', 'directional');
        light.setAttribute('color', '#ffd4a0');
        light.setAttribute('intensity', 0);
        light.setAttribute('position', (dx * 30) + ' 12 ' + (dz * 30));
        this.el.appendChild(light);

        // Two-stage flash: bright peak, dim tail, cleanup
        requestAnimationFrame(function () {
          glow.setAttribute('material', 'opacity', 0.7);
          light.setAttribute('light', 'intensity', 2.5);
        });
        setTimeout(function () {
          glow.setAttribute('material', 'opacity', 0.35);
          light.setAttribute('light', 'intensity', 1.0);
        }, 140);
        setTimeout(function () {
          glow.setAttribute('material', 'opacity', 0);
          light.setAttribute('light', 'intensity', 0);
        }, 450);
        setTimeout(function () {
          if (glow.parentNode) glow.parentNode.removeChild(glow);
          if (light.parentNode) light.parentNode.removeChild(light);
        }, 700);

        // Delayed rumble — sound travels ~340 m/s, 250 m → ~0.7s, but we
        // exaggerate to 2–3s for dramatic effect (explosions feel further away).
        var self = this;
        var delay = 2000 + Math.random() * 1000;
        setTimeout(function () { self._rumble(dx); }, delay);
      },
      _rumble: function (pan) {
        try {
          var ctx = AFRAME.THREE.AudioContext.getContext();
          if (!ctx || ctx.state === 'suspended') return;
          var duration = 1.5 + Math.random() * 0.8;
          var bufferSize = Math.floor(ctx.sampleRate * duration);
          var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          var data = buffer.getChannelData(0);
          for (var i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
          var src = ctx.createBufferSource();
          src.buffer = buffer;
          var filter = ctx.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.value = 90;
          filter.Q.value = 1.5;
          var gain = ctx.createGain();
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.25);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
          src.connect(filter);
          filter.connect(gain);
          var panner = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
          if (panner) {
            panner.pan.value = Math.max(-1, Math.min(1, pan));
            gain.connect(panner);
            panner.connect(ctx.destination);
          } else {
            gain.connect(ctx.destination);
          }
          src.start(ctx.currentTime);
          src.stop(ctx.currentTime + duration);
        } catch(e) { console.warn('[rumble]', e); }
      }
    });

    // ── Rain — GPU-instanced vertical streaks falling through a cylinder
    //    around the rig. Parented to #rig so the cylinder follows the player.
    //    Only the translation columns of each instance matrix are rewritten
    //    each tick, keeping the loop cheap (~1500 * 3 float writes). ────────
    AFRAME.registerComponent('rain', {
      schema: {
        count:  { default: 1500 },
        radius: { default: 12 },
        height: { default: 15 },
        speed:  { default: 8 },
        wind:   { default: 1.2 }
      },
      init: function () {
        var d = this.data;
        var geom = new THREE.PlaneGeometry(0.008, 0.22);
        geom.translate(0, -0.11, 0); // pivot at top so streaks fall from above
        var mat = new THREE.MeshBasicMaterial({
          color: 0xaabbdd,
          transparent: true,
          opacity: 0.35,
          depthWrite: false,
          side: THREE.DoubleSide,
          fog: true
        });
        var mesh = new THREE.InstancedMesh(geom, mat, d.count);
        mesh.frustumCulled = false;
        var dummy = new THREE.Object3D();
        this._positions = new Float32Array(d.count * 3);
        for (var i = 0; i < d.count; i++) {
          var a = Math.random() * Math.PI * 2;
          var r = Math.sqrt(Math.random()) * d.radius;
          var x = Math.cos(a) * r;
          var z = Math.sin(a) * r;
          var y = Math.random() * d.height;
          this._positions[i*3]   = x;
          this._positions[i*3+1] = y;
          this._positions[i*3+2] = z;
          dummy.position.set(x, y, z);
          dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);
        }
        mesh.instanceMatrix.needsUpdate = true;
        this.el.setObject3D('mesh', mesh);
        this._mesh = mesh;
      },
      tick: function (t, dt) {
        if (!this._mesh) return;
        var d = this.data;
        var dtS = Math.min(0.05, dt / 1000);
        var drop  = d.speed * dtS;
        var drift = d.wind * dtS;
        var arr = this._mesh.instanceMatrix.array;
        var pos = this._positions;
        var n = d.count;
        var rad = d.radius;
        var rad2 = rad * 2;
        for (var i = 0; i < n; i++) {
          var i3 = i * 3;
          pos[i3+1] -= drop;
          pos[i3]   += drift;
          if (pos[i3+1] < 0) {
            pos[i3+1] = d.height;
            var a = Math.random() * Math.PI * 2;
            var r = Math.sqrt(Math.random()) * rad;
            pos[i3]   = Math.cos(a) * r;
            pos[i3+2] = Math.sin(a) * r;
          }
          // wrap drift so streaks stay within the cylinder
          if (pos[i3] > rad)  pos[i3] -= rad2;
          if (pos[i3] < -rad) pos[i3] += rad2;
          var off = i * 16;
          arr[off + 12] = pos[i3];
          arr[off + 13] = pos[i3+1];
          arr[off + 14] = pos[i3+2];
        }
        this._mesh.instanceMatrix.needsUpdate = true;
      },
      remove: function () {
        if (this._mesh) {
          this._mesh.geometry.dispose();
          this._mesh.material.dispose();
        }
      }
    });

    // ── Torch pickup — on load, in-hand torch is hidden and #scene-torch lies
    //    on the ground. On grip-down within 0.35m of #scene-torch, swap:
    //    hide the floor torch, show the in-hand one, fire haptic, fade hint. ──
    AFRAME.registerComponent('torch-pickup', {
      init: function () {
        this._pickedUp = false;
        this._sceneTorch = null;
        this._torch = null;
        this._hint = null;
        var self = this;
        // Components init before children/siblings attach their models, so
        // defer the initial visibility flip to the first tick.
        this._needsHideTorch = true;
        this.el.addEventListener('gripdown', function () { self._tryPickup(); });
      },
      _resolve: function () {
        if (!this._sceneTorch) this._sceneTorch = document.getElementById('scene-torch');
        if (!this._torch) this._torch = document.getElementById('torch');
        if (!this._hint) this._hint = document.getElementById('pickup-hint');
      },
      _tryPickup: function () {
        if (this._pickedUp) return;
        this._resolve();
        if (!this._sceneTorch || !this._torch) return;
        var handPos = new THREE.Vector3();
        var torchPos = new THREE.Vector3();
        this.el.object3D.getWorldPosition(handPos);
        this._sceneTorch.object3D.getWorldPosition(torchPos);
        if (handPos.distanceTo(torchPos) >= 0.25) return;
        this._pickedUp = true;
        this._sceneTorch.setAttribute('visible', false);
        this._torch.setAttribute('visible', true);
        if (this._hint) {
          var hint = this._hint;
          var textObj = hint.getObject3D('text');
          if (textObj && textObj.material) {
            textObj.material.transparent = true;
            var start = performance.now();
            var fade = function () {
              var k = Math.min(1, (performance.now() - start) / 500);
              textObj.material.opacity = 1 - k;
              if (k < 1) requestAnimationFrame(fade);
              else hint.setAttribute('visible', false);
            };
            fade();
          } else {
            setTimeout(function () { hint.setAttribute('visible', false); }, 500);
          }
        }
        var gp = this.el.components['oculus-touch-controls'];
        if (gp && gp.controller && gp.controller.hapticActuators && gp.controller.hapticActuators[0]) {
          gp.controller.hapticActuators[0].pulse(0.7, 120);
        }
      },
      tick: function () {
        if (this._needsHideTorch) {
          this._resolve();
          if (this._torch) {
            this._torch.setAttribute('visible', false);
            this._needsHideTorch = false;
          }
        }
      }
    });

    // ── Raycaster warm-up — first raycast into a big Draco scene is slow;
    //    do a dummy one on scene-loaded so the first real point doesn't freeze ──
    AFRAME.registerComponent('raycaster-warmup', {
      init: function () {
        var self = this;
        this.el.addEventListener('loaded', function () {
          var sceneEl = document.querySelector('[gltf-model="#scene-glb"]');
          if (!sceneEl) return;
          sceneEl.addEventListener('model-loaded', function () {
            try {
              var rc = new THREE.Raycaster();
              rc.far = 30;
              rc.set(new THREE.Vector3(0, 1.6, 0), new THREE.Vector3(0, 0, -1));
              rc.intersectObject(sceneEl.object3D, true);
            } catch(e) { console.warn('[warmup]', e); }
          });
        });
      }
    });
  </script>
</head>
<body>

<a-scene
  draco-loader
  raycaster-warmup
  distant-explosions
  fog="type: linear; color: #010306; near: 4; far: 18"
  renderer="colorManagement: true; antialias: false; physicallyCorrectLights: true; exposure: 0.06"
  background="color: #010306"
  vr-mode-ui="enabled: true"
  loading-screen="dotsColor: #ffee88; backgroundColor: #000">

  <a-assets timeout="300000">
    <a-asset-item id="scene-glb" src="a_night_in_the_blitz_14.glb"></a-asset-item>
    <a-asset-item id="torch-glb" src="torch.glb"></a-asset-item>
  </a-assets>

  <!-- Scene -->
  <a-entity gltf-model="#scene-glb" position="0 0 0" scale="1 1 1" night-darken></a-entity>

<!-- Torch resting on floor at spawn — user picks it up with right grip -->
  <a-entity id="scene-torch" gltf-model="#torch-glb"
    position="0.3 0.04 -0.5"
    rotation="0 45 90"
    scale="0.075 0.075 0.075"
    matte-darken></a-entity>

  <!-- Pickup hint — floats above the floor torch, hidden on pickup -->
  <a-entity id="pickup-hint" position="0.3 0.35 -0.5" rotation="-35 0 0"
    text="value: Pick up the torch (grip); align:center; color:#ffddaa; width:0.7; side:double"></a-entity>

  <!-- Sky — solid blackout dark, no horizon texture to break immersion -->
  <a-sky color="#010306"></a-sky>

  <!-- ── Barrage Balloons — silver blimps ~90–130m overhead, slow drift ── -->
  <!-- Moonlight (directional from position 4 10 6) glistens off metalness  -->
  <a-entity id="balloon-1" position="3 28 -18" no-fog
    animation="property:position; from:3 28 -18; to:3 30 -18; dur:9000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 -4; to:0 25 4; dur:38000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.2 1 1.1" radius="1"
      material="shader:standard; color:#b0bcc8; metalness:0.65; roughness:0.22; emissive:#8899aa; emissiveIntensity:0.85; side:double"></a-sphere>
    <a-cylinder radius="0.018" height="28" color="#666" position="0 -14 0"
      material="color:#777; opacity:0.35; transparent:true"></a-cylinder>
  </a-entity>

  <a-entity id="balloon-2" position="-2 40 -28" no-fog
    animation="property:position; from:-2 40 -28; to:-2 43 -28; dur:11000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 3; to:0 -30 -3; dur:44000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.4 1 1.15" radius="1"
      material="shader:standard; color:#aab8c4; metalness:0.65; roughness:0.2; emissive:#8899aa; emissiveIntensity:0.8; side:double"></a-sphere>
    <a-cylinder radius="0.018" height="40" color="#666" position="0 -20 0"
      material="color:#777; opacity:0.3; transparent:true"></a-cylinder>
  </a-entity>

  <a-entity id="balloon-3" position="11 35 -22" no-fog
    animation="property:position; from:11 35 -22; to:11 38 -22; dur:8500; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 -6; to:0 20 5; dur:32000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.3 1 1.1" radius="1"
      material="shader:standard; color:#b4c0cc; metalness:0.68; roughness:0.2; emissive:#8899aa; emissiveIntensity:0.85; side:double"></a-sphere>
    <a-cylinder radius="0.018" height="35" color="#666" position="0 -17.5 0"
      material="color:#777; opacity:0.3; transparent:true"></a-cylinder>
  </a-entity>

  <a-entity id="balloon-4" position="18 50 -12" no-fog
    animation="property:position; from:18 50 -12; to:18 53 -12; dur:13000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 4; to:0 -18 -4; dur:50000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.1 1 1.05" radius="1"
      material="shader:standard; color:#b8c4d0; metalness:0.62; roughness:0.24; emissive:#8899aa; emissiveIntensity:0.8; side:double"></a-sphere>
  </a-entity>

  <a-entity id="balloon-5" position="-6 32 -10" no-fog
    animation="property:position; from:-6 32 -10; to:-6 34 -10; dur:10000; dir:alternate; loop:true; easing:easeInOutSine"
    animation__rot="property:rotation; from:0 0 -3; to:0 35 3; dur:42000; dir:alternate; loop:true; easing:linear">
    <a-sphere scale="3.3 1 1.1" radius="1"
      material="shader:standard; color:#acbac6; metalness:0.67; roughness:0.21; emissive:#8899aa; emissiveIntensity:0.85; side:double"></a-sphere>
    <a-cylinder radius="0.018" height="32" color="#666" position="0 -16 0"
      material="color:#777; opacity:0.3; transparent:true"></a-cylinder>
  </a-entity>

  <!-- ── Audio trigger — positional radio, louder as you approach ────────── -->
  <!-- sound component with positional:true routes playback through a PannerNode -->
  <a-entity position="1.9018 1.0607 -15.302" audio-trigger="once: true"
    sound="src: url(blitz_audio_test.mp4); positional: true; distanceModel: inverse; refDistance: 2; rolloffFactor: 2; volume: 1; autoplay: false; loop: false"
    geometry="primitive:sphere; radius:0.5"
    material="opacity:0; transparent:true; side:double">
  </a-entity>

  <!-- Searchlights — sweeping cone beams from rooftop level.
       Two-layer cone (hot inner core + softer outer halo) + emissive "arc lamp"
       at the base, on a pulsing opacity animation for carbon-arc shimmer.
       Flat shader only — no actual spot lights (Quest 3-spot budget stays free). -->
  <a-entity position="-10 12 -35"
    animation="property:rotation; from:0 -50 0; to:0 50 0; dur:9000; dir:alternate; loop:true; easing:easeInOutSine">
    <a-entity
      animation="property:rotation; from:-8 0 0; to:6 0 0; dur:3700; dir:alternate; loop:true; easing:easeInOutSine">
      <!-- Arc-lamp housing — bright point the beam emanates from -->
      <a-sphere radius="0.55" position="0 0.3 0" no-fog
        material="shader:flat; color:#fff4d8; fog:false"></a-sphere>
      <!-- Inner hot core — narrow, brighter, whiter -->
      <a-entity geometry="primitive:cone; height:220; radiusBottom:2.4; radiusTop:0.12; segmentsRadial:8"
        material="color:#ffffff; opacity:0.16; transparent:true; side:double; shader:flat"
        no-fog position="0 110 0"
        animation="property:material.opacity; from:0.13; to:0.20; dur:2100; dir:alternate; loop:true; easing:easeInOutSine"></a-entity>
      <!-- Outer halo — wider, coloured, softer -->
      <a-entity geometry="primitive:cone; height:220; radiusBottom:6; radiusTop:0.3; segmentsRadial:8"
        material="color:#a8d0ff; opacity:0.10; transparent:true; side:double; shader:flat"
        no-fog position="0 110 0"
        animation="property:material.opacity; from:0.08; to:0.13; dur:2600; dir:alternate; loop:true; easing:easeInOutSine"></a-entity>
    </a-entity>
  </a-entity>

  <a-entity position="20 8 -42"
    animation="property:rotation; from:0 -55 0; to:0 20 0; dur:13000; dir:alternate; loop:true; easing:easeInOutSine">
    <a-entity
      animation="property:rotation; from:-5 0 0; to:8 0 0; dur:5100; dir:alternate; loop:true; easing:easeInOutSine">
      <a-sphere radius="0.5" position="0 0.3 0" no-fog
        material="shader:flat; color:#fff4d8; fog:false"></a-sphere>
      <a-entity geometry="primitive:cone; height:220; radiusBottom:2.2; radiusTop:0.12; segmentsRadial:8"
        material="color:#ffffff; opacity:0.15; transparent:true; side:double; shader:flat"
        no-fog position="0 110 0"
        animation="property:material.opacity; from:0.12; to:0.19; dur:1900; dir:alternate; loop:true; easing:easeInOutSine"></a-entity>
      <a-entity geometry="primitive:cone; height:220; radiusBottom:5.5; radiusTop:0.3; segmentsRadial:8"
        material="color:#bbe0ff; opacity:0.09; transparent:true; side:double; shader:flat"
        no-fog position="0 110 0"
        animation="property:material.opacity; from:0.07; to:0.12; dur:3100; dir:alternate; loop:true; easing:easeInOutSine"></a-entity>
    </a-entity>
  </a-entity>

  <!-- Lighting -->
  <a-light id="scene-ambient" type="ambient" color="#0a0f1a" intensity="0.12"></a-light>
  <!-- Sun — off by default, switched on by day mode panel -->
  <a-light id="sun-light" type="directional" color="#fff8e8" intensity="0" position="-3 10 5"></a-light>
  <!-- Moonlight — gentle cool blue-white directional from high right behind player -->
  <a-light type="directional" color="#c8d8ff" intensity="0.04"
           position="4 10 6"></a-light>
  <!-- Blackout lamp lights — spotlights pointing straight down, light only reaches ground -->
  <a-light type="spot" color="#ffaa33" intensity="40" distance="8" decay="2" angle="35" penumbra="0.4"
           position="3.32 3.07 -19.04" target="#lamp-target-1"></a-light>
  <a-entity id="lamp-target-1" position="3.32 0 -19.04"></a-entity>
  <a-light type="spot" color="#ffaa33" intensity="40" distance="8" decay="2" angle="35" penumbra="0.4"
           position="15.36 2.74 -17.77" target="#lamp-target-2"></a-light>
  <a-entity id="lamp-target-2" position="15.36 0 -17.77"></a-entity>

  <!-- Player -->
  <a-entity id="rig" position="0 0 0"
            movement-controls="fly: false; speed: 0.2; camera: #cam"
            smooth-turn="speed: 60">

    <!-- Rain — instanced streaks falling in a cylinder around the player -->
    <a-entity rain></a-entity>

    <a-entity id="cam" camera look-controls position="0 1.6 0">
      <!-- Breath condensation — faint puff, only visible against the dark -->
      <a-entity breath-puff position="0 -0.06 -0.28"
        geometry="primitive:sphere; radius:0.04; segmentsWidth:12; segmentsHeight:8"
        material="color:#e8f0f8; opacity:0; transparent:true; depthWrite:false; fog:false"></a-entity>
    </a-entity>

    <a-entity oculus-touch-controls="hand: left; model: false" audio-unlock-vr></a-entity>

    <a-entity oculus-touch-controls="hand: right; model: false"
              torch-toggle brightness-cycle audio-unlock-vr torch-pickup>
      <!-- Torch model — held in right hand, points forward (-Z) -->
      <!-- down 5cm (-0.07), back 10cm (+0.05 in controller Z = toward player) -->
      <a-entity id="torch" position="0 -0.07 0.05" rotation="-140 0 0">
        <!-- Moonlight bounce inside torch so it toggles off with it -->
        <a-entity light="type:directional; color:#8899cc; intensity:0.04" position="0.3 1 -0.2"></a-entity>
        <!-- Torch GLB model — matte, responds to torch light, no reflections -->
        <a-entity id="torch-glb-entity" gltf-model="#torch-glb" scale="0.075 0.075 0.075" rotation="90 0 0" position="0 0 0" matte-darken></a-entity>
        <!-- Bulb glow — at the narrow angled tip (front, +Y) -->
        <a-entity id="torch-glow" position="0 0.055 0">
          <a-sphere radius="0.003" material="shader:standard; color:#ffb866; emissive:#ff7030; emissiveIntensity:3; roughness:0.3"></a-sphere>
          <a-entity light="type:point; color:#ff9900; intensity:0.06; distance:0.4; decay:2"></a-entity>
        </a-entity>
        <!-- Spotlight target — far forward so beam follows hand direction -->
        <a-entity id="torch-beam-target" position="0 20 0"></a-entity>
        <!-- Spotlight beam — directional so it doesn't flood the scene orange -->
        <a-entity id="torch-point" light="type:spot; color:#ffc890; intensity:500; distance:10; decay:2; angle:15; penumbra:0.55; target:#torch-beam-target"
                  torch-flicker="base:500; range:25; speed:2.5"
                  torch-raycaster
                  position="0 0.08 0"></a-entity>
      </a-entity>
    </a-entity>

  </a-entity>

</a-scene>
<div id="version-overlay">v53</div>

<!-- ── Day/Night panel — desktop only, hidden in VR ─────────────────── -->
<div id="mode-panel" style="
  position:fixed; top:12px; left:12px; z-index:9999;
  background:rgba(0,0,0,0.82); color:#eee; font-family:monospace; font-size:14px;
  padding:16px 20px; border-radius:8px;
  display:block;">
  <b style="color:#ffaa44">A Night in the Blitz</b>
  <div style="margin-top:14px; display:flex; gap:10px;">
    <button id="btn-night" onclick="setNight()" style="
      padding:10px 20px; font-size:14px; cursor:pointer;
      background:#1a2a3a; color:#aaccff; border:2px solid #aaccff; border-radius:6px;">
      Night
    </button>
    <button id="btn-day" onclick="setDay()" style="
      padding:10px 20px; font-size:14px; cursor:pointer;
      background:#2a1a00; color:#ffcc66; border:2px solid #ffcc66; border-radius:6px;">
      Day
    </button>
  </div>
  <div style="margin-top:10px; color:#666; font-size:11px">Hidden when entering VR</div>
</div>
<script>
  document.querySelector('a-scene').addEventListener('enter-vr', function() {
    document.getElementById('mode-panel').style.display = 'none';
  });
  document.querySelector('a-scene').addEventListener('exit-vr', function() {
    document.getElementById('mode-panel').style.display = 'block';
  });

  function _applySceneColors(r, g, b) {
    var sceneGlb = document.querySelector('[gltf-model="#scene-glb"]');
    if (!sceneGlb || !sceneGlb.object3D) return;
    sceneGlb.object3D.traverse(function (node) {
      if (!node.isMesh) return;
      var mats = Array.isArray(node.material) ? node.material : [node.material];
      mats.forEach(function (m) {
        if (!m) return;
        // For textured materials use (r,g,b) as the tint; for flat colours scale the full channel
        if (m.map) {
          m.color.setRGB(r, g, b);
        } else {
          m.color.setRGB(r * 0.9, g * 0.85, b * 0.8);
        }
        m.needsUpdate = true;
      });
    });
  }

  function _setExposure(val) {
    // setAttribute alone is unreliable in A-Frame 1.5 — hit the renderer directly
    var aScene = document.querySelector('a-scene');
    try { if (aScene.renderer) aScene.renderer.toneMappingExposure = val; } catch(e) {}
    try { aScene.setAttribute('renderer', 'exposure', val); } catch(e) {}
  }

  function setNight() {
    var scene = document.querySelector('a-scene');
    _setExposure(0.06);
    scene.setAttribute('fog', 'type:linear; color:#010306; near:4; far:18');
    var ambient = document.getElementById('scene-ambient');
    if (ambient) ambient.setAttribute('light', 'color:#0a0f1a; intensity:0.12');
    var sun = document.getElementById('sun-light');
    if (sun) sun.setAttribute('light', 'intensity', 0);
    var sky = document.querySelector('a-sky');
    if (sky) sky.setAttribute('color', '#010306');
    scene.setAttribute('background', 'color: #010306');
    _applySceneColors(0.08, 0.08, 0.08);
    document.getElementById('btn-night').style.borderColor = '#ffffff';
    document.getElementById('btn-day').style.borderColor = '#ffcc66';
  }

  function setDay() {
    var scene = document.querySelector('a-scene');
    _setExposure(1.5);
    // Push fog well past the scene so nothing hides behind it
    scene.setAttribute('fog', 'type:linear; color:#c8e4f0; near:80; far:200');
    var ambient = document.getElementById('scene-ambient');
    if (ambient) ambient.setAttribute('light', 'color:#ffffff; intensity:4.0');
    var sun = document.getElementById('sun-light');
    if (sun) sun.setAttribute('light', 'color:#fff8e8; intensity:4.0');
    var sky = document.querySelector('a-sky');
    if (sky) sky.setAttribute('color', '#87ceeb');
    scene.setAttribute('background', 'color: #87ceeb');
    _applySceneColors(1.0, 1.0, 1.0);
    document.getElementById('btn-day').style.borderColor = '#ffffff';
    document.getElementById('btn-night').style.borderColor = '#aaccff';
  }

  function setNightMaterials() {
    _applySceneColors(0.08, 0.08, 0.08);
  }
</script>
</body>
</html>
